*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#5e8b62;--sage-mid:#8ab88e;--sage-light:#d4e8d6;
  --terra:#b85c38;--terra-light:#f2ddd4;
  --sky:#3a7ca5;--sky-light:#d0e4f0;
  --plum:#7c5c8a;--plum-light:#e8d8f0;
  --honey:#c4892a;--honey-light:#f5e4c4;
  --rose:#b85070;--rose-light:#f0d4de;
  --ink:#1e1b16;--muted:#7a7060;--border:#e0d8cc;
  --bg:#f5f2ed;--surface:#fff;--parchment:#ede8df;
}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:2px solid var(--sage);outline-offset:1px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#c8bfb0;border-radius:4px}
#root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.top-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.top-logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--sage)}
.content{flex:1;overflow-y:auto;padding-bottom:72px}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 12px;flex-shrink:0;position:sticky;bottom:0;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--sage)}
.nav-dot{width:0;height:3px;border-radius:2px;background:var(--sage);transition:width .2s;margin-top:1px}
.nav-btn.active .nav-dot{width:18px}
.page{display:none;flex-direction:column}
.page.active{display:flex}
.page-header{padding:14px 16px 0;flex-shrink:0}
.family-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.page-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);display:flex;align-items:center;justify-content:space-between}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.btn{border:none;border-radius:10px;font-weight:700;font-size:13px;padding:8px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.8}
.btn-primary{background:var(--sage);color:#fff}
.btn-secondary{background:var(--parchment);color:var(--muted);border:1px solid var(--border)}
.btn-danger{background:var(--rose-light);color:var(--rose);border:1px solid #b8507044}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:14px}
.btn-full{width:100%;justify-content:center}
.inp{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink);width:100%;background:var(--surface);-webkit-appearance:none}
.sel{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink);width:100%;background:var(--surface)}
.lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-bg{position:fixed;inset:0;background:rgba(20,18,14,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.22,.68,0,1.2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink)}
.modal-close{background:var(--parchment);border:none;border-radius:8px;width:30px;height:30px;font-size:18px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:15px 18px 32px;flex:1}
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:var(--surface);border-radius:20px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;background:var(--bg)}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin .7s linear infinite}
.chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;display:inline-flex;align-items:center}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px}
.tab{padding:10px 14px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;margin-bottom:-1px;transition:color .2s}
.tab.active{color:var(--sage);border-bottom-color:var(--sage)}
.tbl{width:100%;border-collapse:collapse;min-width:640px}
.tbl th{padding:8px 7px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;text-align:left;border-bottom:1px solid var(--border);background:var(--parchment);white-space:nowrap}
.tbl td{padding:8px 7px;font-size:13px;color:var(--ink);border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:nth-child(even) td{background:#faf8f466}
.note-card{border-radius:13px;padding:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .15s}
.note-card:active{transform:scale(.97)}
.ob-bg{position:fixed;inset:0;background:rgba(20,18,14,.7);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease}
.ob-card{background:var(--surface);border-radius:22px;padding:26px;max-width:380px;width:100%}
.ob-dots{display:flex;gap:5px;justify-content:center;margin-bottom:20px}
.ob-dot{height:6px;border-radius:99px;background:var(--border);transition:all .3s}
.ob-dot.active{background:var(--sage);width:18px}
.ob-dot:not(.active){width:6px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeUp .3s ease;pointer-events:none;white-space:nowrap}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>

</div>

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt=d=>{if(!d)return'';const x=new Date(d);return`${String(x.getDate()).padStart(2,'0')}/${String(x.getMonth()+1).padStart(2,'0')}/${x.getFullYear()}`;};
const toISO=d=>d?new Date(d).toISOString().split('T')[0]:'';
const todayD=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const isSameDay=(a,b)=>{const da=new Date(a),db=new Date(b);return da.getFullYear()===db.getFullYear()&&da.getMonth()===db.getMonth()&&da.getDate()===db.getDate();};
const getMem=id=>A.members.find(m=>m.id===id);
const symC=()=>CURRENCIES.find(c=>c.code===(A.family?.currency||'EUR'))?.sym||'€';
const av=(m,sz=28)=>`<div class="avatar" style="width:${sz}px;height:${sz}px;background:${m.color}22;border:2px solid ${m.color};font-size:${Math.round(sz*.38)}px;color:${m.color}">${m.avatar||m.name[0]}</div>`;

function toast(msg,isErr=false){
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=isErr?T.rose:T.sage;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function switchAuth(m){
  document.getElementById('auth-login').style.display=m==='login'?'block':'none';
  document.getElementById('auth-signup').style.display=m==='signup'?'block':'none';
  document.getElementById('a-msg').textContent='';
  document.getElementById('s-msg').textContent='';
}

async function doLogin(){
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const msg=document.getElementById('a-msg');
  if(!email||!pass){msg.textContent='Please fill in all fields.';return;}
  msg.textContent='Signing in…';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)msg.textContent=error.message;
}

async function doSignup(){
  const name=document.getElementById('s-name').value.trim();
  const email=document.getElementById('s-email').value.trim();
  const pass=document.getElementById('s-pass').value;
  const msg=document.getElementById('s-msg');
  if(!name||!email||!pass){msg.textContent='Please fill in all fields.';return;}
  if(pass.length<6){msg.textContent='Password must be at least 6 characters.';return;}
  msg.textContent='Creating account…';
  const{error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
  if(error){msg.textContent=error.message;return;}
  msg.style.color=T.sage;
  msg.textContent='Account created! Signing you in…';
}

async function doSignOut(){
  await sb.auth.signOut();
  location.reload();
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadAll(){
  const[fam,mems,evts,ngrps,nts,dm,om]=await Promise.all([
    sb.from('families').select('*').maybeSingle(),
    sb.from('family_members').select('*').order('created_at'),
    sb.from('events').select('*').order('date'),
    sb.from('note_groups').select('*').order('created_at'),
    sb.from('notes').select('*').order('created_at'),
    sb.from('daily_meds').select('*').order('created_at'),
    sb.from('occasional_meds').select('*').order('created_at'),
  ]);
  if(fam.data)A.family=fam.data;
  A.members=mems.data||[];
  A.events=evts.data||[];
  A.noteGroups=ngrps.data||[];
  A.notes=nts.data||[];
  A.dailyMeds=dm.data||[];
  A.occMeds=om.data||[];
}

async function initApp(user){
  A.user=user;
  document.getElementById('loading-screen').style.display='none';
  try{await loadAll();}catch(e){console.error('Load error',e);}
  if(!A.family){
    // New user - create family
    const uname=user.user_metadata?.name||user.email.split('@')[0];
    const{data:fam,error:fe}=await sb.from('families').insert({
      name:`${uname}'s Family`,owner_id:user.id
    }).select().single();
    if(fe){console.error('Family create error',fe);}
    if(fam){
      A.family=fam;
      const{data:mem}=await sb.from('family_members').insert({
        family_id:fam.id,user_id:user.id,name:uname,
        role:'Parent',email:user.email,
        color:T.sage,avatar:uname[0].toUpperCase(),is_owner:true
      }).select().single();
      if(mem)A.members=[mem];
    }
    A.showOB=true;
  }
  document.getElementById('root').style.display='flex';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('fam-badge').textContent=A.family?.name||'';
  goTo('calendar');
  if(A.showOB)renderOB();
}

function goTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCal(){
  const vY=A.calDate.getFullYear(),vM=A.calDate.getMonth();
  // Monday-first: shift getDay() so Monday=0, Sunday=6
  const rawFirst=new Date(vY,vM,1).getDay();
  const firstDay=(rawFirst+6)%7;
  const dIM=new Date(vY,vM+1,0).getDate();
  const cells=Array.from({length:Math.ceil((firstDay+dIM)/7)*7},(_,i)=>{const d=i-firstDay+1;return d>=1&&d<=dIM?d:null;});

  const filtered=A.events.filter(e=>{
    if(A.calFType!=='all'&&e.type!==A.calFType)return false;
    if(A.calFMember!=='all'&&!(e.participants||[]).includes(A.calFMember)&&e.member_id!==A.calFMember)return false;
    if(A.calSearch){const q=A.calSearch.toLowerCase();if(![e.title,e.description,e.location,e.activity,...(e.tags||[])].filter(Boolean).join(' ').toLowerCase().includes(q))return false;}
    return true;
  });

  const evOnDay=d=>filtered.filter(e=>isSameDay(e.date,new Date(vY,vM,d)));

  let grid='';
  if(A.calView==='month'){
    grid=`<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px">
      ${DN.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:${T.muted};padding:3px 0;text-transform:uppercase">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${cells.map(d=>{
        if(!d)return'<div style="min-height:80px"></div>';
        const isT=isSameDay(new Date(vY,vM,d),todayD());
        const de=evOnDay(d);
        const shortT=e=>{const t=e.title||ET[e.type].label;const s=t.replace(/\s*[-–]\s*Wellness Log$/i,'').replace(/^Wellness Log$/i,'Log');return s.length>8?s.substring(0,7)+'…':s;};
        const pillC=e=>{const mid=e.member_id||(e.participants&&e.participants[0]);const mem=A.members.find(m=>m.id===mid);return mem?mem.color:ET[e.type].color;};
        return`<div onclick="calClick(${d})" style="min-height:80px;padding:3px 2px 4px;border-radius:9px;background:${isT?T.sageLight:de.length?T.surface:T.parchment+'22'};border:1px solid ${isT?T.sageMid:T.border};cursor:pointer;overflow:hidden">
          <div style="width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${isT?T.sage:'transparent'};color:${isT?'#fff':T.ink};font-size:11px;font-weight:${isT?800:600};margin:0 auto 3px">${d}</div>
          <div style="display:flex;flex-direction:column;gap:2px">
            ${de.slice(0,3).map(e=>{const pc=pillC(e);return`<div style="background:${pc}22;border-left:2px solid ${pc};border-radius:0 3px 3px 0;padding:1px 2px;font-size:9px;font-weight:700;color:${pc};line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="${e.title||ET[e.type].label}">${ET[e.type].icon} ${shortT(e)}</div>`;}).join('')}
            ${de.length>3?`<div style="font-size:8px;color:${T.muted};font-weight:700;text-align:center;padding-top:1px">+${de.length-3} more</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } else if(A.calView==='week'){
    const ws=new Date(A.calDate);const wd=ws.getDay();ws.setDate(ws.getDate()-((wd+6)%7));
    grid=Array.from({length:7},(_,i)=>{
      const d=new Date(ws);d.setDate(d.getDate()+i);
      const de=filtered.filter(e=>isSameDay(e.date,d));
      const isT=isSameDay(d,todayD());
      return`<div style="display:flex;gap:10px;margin-bottom:8px">
        <div style="width:38px;height:38px;border-radius:50%;background:${isT?T.sage:T.parchment};display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid ${isT?T.sageMid:T.border};flex-shrink:0">
          <div style="font-size:9px;font-weight:700;color:${isT?'#fff':T.muted};text-transform:uppercase">${DN[(d.getDay()+6)%7]}</div>
          <div style="font-size:13px;font-weight:800;color:${isT?'#fff':T.ink};line-height:1">${d.getDate()}</div>
        </div>
        <div style="flex:1;padding-top:2px">
          ${de.length?de.map(e=>`<div onclick="viewEv('${e.id}')" style="display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:8px;background:${ET[e.type].bg};margin-bottom:4px;cursor:pointer">
            <span>${ET[e.type].icon}</span><span style="font-size:12px;font-weight:600;color:${T.ink}">${e.title||ET[e.type].label}</span>
          </div>`).join(''):`<div style="font-size:12px;color:${T.muted};font-style:italic;padding-top:10px">No entries</div>`}
        </div>
      </div>`;
    }).join('');
  } else {
    // Year view with mini month grids
    grid=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${MN.map((mn,mi)=>{
        const mFirstDay=new Date(vY,mi,1).getDay();
        const mDIM=new Date(vY,mi+1,0).getDate();
        const mCells=Array.from({length:Math.ceil((mFirstDay+mDIM)/7)*7},(_,i)=>{const d=i-mFirstDay+1;return d>=1&&d<=mDIM?d:null;});
        const mEvs=filtered.filter(e=>new Date(e.date).getMonth()===mi&&new Date(e.date).getFullYear()===vY);
        const mEvDays=new Set(mEvs.map(e=>new Date(e.date).getDate()));
        return`<div onclick="A.calDate=new Date(${vY},${mi},1);A.calView='month';renderCal()" style="background:${T.surface};border-radius:12px;border:1px solid ${T.border};padding:10px;cursor:pointer">
          <div style="font-weight:700;font-size:13px;color:${T.ink};margin-bottom:6px;text-align:center">${mn.slice(0,3)} ${mEvs.length>0?`<span style="font-size:10px;color:${T.sage};font-weight:700">(${mEvs.length})</span>`:''}</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">
            ${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:8px;font-weight:700;color:${T.muted}">${d}</div>`).join('')}
            ${mCells.map(d=>{
              if(!d)return'<div></div>';
              const isT=isSameDay(new Date(vY,mi,d),todayD());
              const hasEv=mEvDays.has(d);
              return`<div style="width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${isT?T.sage:hasEv?T.sageLight:'transparent'};font-size:8px;font-weight:${hasEv?700:400};color:${isT?'#fff':hasEv?T.sage:T.muted}">${d}</div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  const searchRes=A.calSearch&&filtered.length>0?`<div style="padding:0 16px">
    <div style="font-size:11px;font-weight:700;color:${T.muted};margin-bottom:8px;text-transform:uppercase">${filtered.length} result${filtered.length!==1?'s':''}</div>
    ${filtered.map(e=>`<div onclick="viewEv('${e.id}')" class="card" style="padding:10px 13px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:10px">
      <span style="font-size:17px">${ET[e.type].icon}</span>
      <div><div style="font-weight:700;font-size:13px">${e.title||ET[e.type].label}</div><div style="font-size:11px;color:${T.muted}">${fmt(e.date)}</div></div>
    </div>`).join('')}
  </div>`:'';

  document.getElementById('page-calendar').innerHTML=`
    <div class="page-header">
      <div class="family-label">${A.family?.name||''}</div>
      <div class="page-title">Calendar <button class="btn btn-primary btn-sm" onclick="showPicker(null)">+ Add</button></div>
    </div>
    <div style="padding:8px 16px 0;display:flex;gap:5px;flex-wrap:wrap">
      ${['month','week','year'].map(v=>`<button onclick="A.calView='${v}';renderCal()" style="padding:4px 12px;border-radius:99px;border:1.5px solid ${A.calView===v?T.sage:T.border};background:${A.calView===v?T.sage:'#fff'};color:${A.calView===v?'#fff':T.muted};font-weight:700;font-size:12px;cursor:pointer;text-transform:capitalize">${v}</button>`).join('')}
      <button onclick="A.calDate=new Date();renderCal()" style="padding:4px 12px;border-radius:99px;border:1.5px solid ${T.border};background:#fff;color:${T.muted};font-weight:700;font-size:12px;cursor:pointer;margin-left:auto">Today</button>
    </div>
    <div style="padding:7px 16px 0;display:flex;gap:6px;overflow-x:auto">
      <select class="sel" style="width:auto;font-size:12px;padding:5px 8px;border-radius:20px;flex-shrink:0" onchange="A.calFType=this.value;renderCal()">
        <option value="all">All types</option>
        ${Object.entries(ET).map(([k,v])=>`<option value="${k}"${A.calFType===k?' selected':''}>${v.icon} ${v.label}</option>`).join('')}
      </select>
      <select class="sel" style="width:auto;font-size:12px;padding:5px 8px;border-radius:20px;flex-shrink:0" onchange="A.calFMember=this.value;renderCal()">
        <option value="all">All members</option>
        ${A.members.map(m=>`<option value="${m.id}"${A.calFMember===m.id?' selected':''}>${m.name}</option>`).join('')}
      </select>
    </div>
    <div style="padding:6px 16px 0">
      <input class="inp" placeholder="🔍  Search entries…" value="${A.calSearch}" oninput="A.calSearch=this.value;renderCal()">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0">
      <button onclick="A.calDate=new Date(${vY},${vM-1},1);renderCal()" style="background:${T.parchment};border:1px solid ${T.border};border-radius:9px;width:33px;height:33px;font-size:18px;cursor:pointer">‹</button>
      <button onclick="showMPicker()" style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:${T.ink};background:none;border:none;cursor:pointer">${MN[vM]} ${vY}</button>
      <button onclick="A.calDate=new Date(${vY},${vM+1},1);renderCal()" style="background:${T.parchment};border:1px solid ${T.border};border-radius:9px;width:33px;height:33px;font-size:18px;cursor:pointer">›</button>
    </div>
    <div style="padding:8px 16px">${grid}</div>
    ${searchRes}
  `;
}
window.renderCal=renderCal;

function calClick(d){
  const vY=A.calDate.getFullYear(),vM=A.calDate.getMonth();
  const dt=new Date(vY,vM,d);
  const de=A.events.filter(e=>isSameDay(e.date,dt));
  if(de.length)showDayModal(dt,de);
  else showPicker(dt);
}
window.calClick=calClick;

function showDayModal(dt,de){
  showModal(`${DNF[dt.getDay()]}, ${fmt(dt)}`,
    `${de.map(e=>`<div onclick="closeModal();setTimeout(()=>viewEv('${e.id}'),50)" style="display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:11px;background:${ET[e.type].bg};margin-bottom:8px;cursor:pointer">
      <span style="font-size:18px">${ET[e.type].icon}</span>
      <div><div style="font-weight:700">${e.title||ET[e.type].label}</div>${e.location?`<div style="font-size:12px;color:${T.muted}">📍 ${e.location}</div>`:''}</div>

async function saveEv(type,evId,dateTs){
  if(!A.family){toast('Set up your family first.',true);return;}
  let data={family_id:A.family.id,type};
  try{
    if(type==='wellness'){
      data.member_id=document.getElementById('ef-mem')?.value||null;
      data.date=new Date(document.getElementById('ef-date').value).toISOString();
      const mem=getMem(data.member_id);
      data.title=mem?`${mem.name} – Wellness Log`:'Wellness Log';
      data.weight=parseFloat(document.getElementById('ef-wt')?.value)||null;
      data.height=parseFloat(document.getElementById('ef-ht')?.value)||null;
      data.hydration=parseInt(document.getElementById('ef-hyd')?.value)||null;
      data.exercised=document.getElementById('ef-ex')?.checked||false;
      data.activity=document.getElementById('ef-act')?.value||null;
      data.activity_mins=parseInt(document.getElementById('ef-actm')?.value)||null;
      data.mood=document.getElementById('ef-mood')?.value||null;
      data.energy=parseInt(document.getElementById('ef-en')?.value)||null;
      data.sleep=parseFloat(document.getElementById('ef-sl')?.value)||null;
    } else {
      data.title=document.getElementById('ef-title')?.value||'';
      if(!data.title){toast('Please add a title.',true);return;}
      if(type==='task'){
        const dv=document.getElementById('ef-date')?.value;
        data.date=dv?new Date(dv).toISOString():new Date().toISOString();
        data.end_date=null;
        data.all_day=true;
      } else {
        const allDay=document.getElementById('ef-allday')?.checked||false;
        data.all_day=allDay;
        const dateV=document.getElementById('ef-date')?.value||toISO(new Date());
        const stimeV=allDay?'00:00':document.getElementById('ef-stime')?.value||'00:00';
        const endDateV=document.getElementById('ef-enddate')?.value||dateV;
        const etimeV=allDay?'00:00':document.getElementById('ef-etime')?.value||'00:00';
        // Build ISO strings from separate date+time fields
        data.date=new Date(dateV+'T'+stimeV).toISOString();
        data.end_date=new Date(endDateV+'T'+etimeV).toISOString();
      }
      data.location=document.getElementById('ef-loc')?.value||null;
      data.description=document.getElementById('ef-desc')?.value||null;
      data.appt_type=document.getElementById('ef-apt')?.value||null;
      data.recurrence=document.getElementById('ef-rec')?.value||'None';
      data.member_id=document.getElementById('ef-mem')?.value||null;
      data.participants=Array.from(document.querySelectorAll('#ef-parts button[data-sel="true"]')).map(b=>b.dataset.mid).filter(Boolean);
      data.tags=Array.from(document.querySelectorAll('#ef-tags button[data-sel="true"]')).map(b=>b.dataset.tag).filter(Boolean);
    }
    let res;
    // Always strip family_id from update payload to avoid RLS issues
    if(evId){
      const{family_id:_,...updateData}=data;
      res=await sb.from('events').update(updateData).eq('id',evId).select().single();
    }
    else{res=await sb.from('events').insert(data).select().single();}
    if(res.error){console.error('Event save error',res.error);toast('Error saving. Check console.',true);return;}
    if(evId)A.events=A.events.map(e=>e.id===evId?res.data:e);
    else A.events.push(res.data);
    closeModal();toast(evId?'Entry updated!':'Entry added!');renderCal();
  }catch(e){console.error('saveEv error',e);toast('Unexpected error.',true);}
}
window.saveEv=saveEv;

function renderNB(){
  const notes=A.notes,groups=A.noteGroups;
  const filtered=notes.filter(n=>{
    if(A.noteFGroup==='none'&&n.group_id)return false;
    if(A.noteFGroup!=='all'&&A.noteFGroup!=='none'&&n.group_id!==A.noteFGroup)return false;
    if(A.noteSearch){const q=A.noteSearch.toLowerCase();if(![n.title,n.content,...(n.tags||[]),...(n.checklist||[]).map(c=>c.text)].join(' ').toLowerCase().includes(q))return false;}
    return true;
  });
  const pinned=filtered.filter(n=>n.pinned),rest=filtered.filter(n=>!n.pinned);
  const nCard=n=>{
    const mem=getMem(n.member_id);
    const grp=groups.find(g=>g.id===n.group_id);
    const done=(n.checklist||[]).filter(c=>c.done).length,total=(n.checklist||[]).length;
    return`<div class="note-card" style="background:${n.color}" onclick="openNote('${n.id}')">
      ${n.pinned?'<div style="font-size:10px;margin-bottom:3px">📌</div>':''}
      <div style="font-weight:800;font-size:13px;color:${T.ink};margin-bottom:5px;line-height:1.3">${n.title||'Untitled'}</div>
      ${n.content?`<div style="font-size:12px;color:${T.muted};line-height:1.5;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px">${n.content}</div>`:''}
      ${total>0?`<div style="font-size:11px;color:${T.muted};margin-bottom:5px">✅ ${done}/${total}</div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        ${grp?`<span style="font-size:10px;font-weight:700;background:rgba(255,255,255,.55);border-radius:99px;padding:2px 6px;color:${T.ink}">${grp.name}</span>`:''}
        ${mem?av(mem,16):''}
      </div>
    </div>`;
  };

  document.getElementById('page-notebook').innerHTML=`
    <div class="page-header">
      <div class="family-label">${A.family?.name||''}</div>
      <div class="page-title">Notebook <button class="btn btn-primary btn-sm" onclick="openNote(null)">+ Note</button></div>
    </div>
    <div style="padding:10px 16px 0">
      <input class="inp" placeholder="🔍  Search notes…" value="${A.noteSearch}" oninput="A.noteSearch=this.value;renderNB()" style="margin-bottom:10px">
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">
        ${[{id:'all',name:'All'},{id:'none',name:'Uncategorized'},...groups].map(g=>`<button onclick="A.noteFGroup='${g.id}';renderNB()" style="padding:4px 12px;border-radius:99px;border:1.5px solid ${A.noteFGroup===g.id?T.sage:T.border};background:${A.noteFGroup===g.id?T.sage:'#fff'};color:${A.noteFGroup===g.id?'#fff':T.muted};font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0">${g.name}</button>`).join('')}
        <button onclick="openAddGroup()" style="padding:4px 12px;border-radius:99px;border:1.5px dashed ${T.border};background:${T.parchment};color:${T.muted};font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0">+ Group</button>
      </div>
    </div>
    <div style="padding:10px 16px 0">
      ${pinned.length?`<div style="font-size:11px;font-weight:700;color:${T.muted};text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">📌 Pinned</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${pinned.map(nCard).join('')}</div>`:''}
      ${rest.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${rest.map(nCard).join('')}</div>`:''}
      ${filtered.length===0?`<div style="text-align:center;color:${T.muted};padding:48px 0;font-size:14px">No notes yet ✍️</div>`:''}
    </div>`;
}

function openAddGroup(){
  showModal('New Group',`
    <div class="form-row"><label class="lbl">Group name</label><input class="inp" id="ng-name" placeholder="e.g. 🏠 Household" autofocus></div>
    <button class="btn btn-primary btn-full" onclick="saveGroup()">Create Group</button>`);
}
window.openAddGroup=openAddGroup;

async function saveGroup(){
  if(!A.family)return;
  const name=document.getElementById('ng-name')?.value?.trim();
  if(!name){toast('Please add a name.',true);return;}
  const{data,error}=await sb.from('note_groups').insert({family_id:A.family.id,name}).select().single();
  if(error){toast('Error creating group.',true);console.error(error);return;}
  A.noteGroups.push(data);
  closeModal();toast('Group created!');renderNB();
}
window.saveGroup=saveGroup;

function openNote(noteId){
  const note=noteId?A.notes.find(n=>n.id===noteId):null;
  const groups=A.noteGroups;
  const cl=note?.checklist||[];
  showModal(noteId?'Edit Note':'New Note',`
    <input id="ne-t" class="inp" value="${note?.title||''}" placeholder="Title…" style="font-size:16px;font-weight:700;margin-bottom:8px" autofocus>
    <textarea id="ne-c" class="inp" rows="3" placeholder="Write your note…" style="resize:none;margin-bottom:10px">${note?.content||''}</textarea>
    <div id="ne-cl" style="margin-bottom:6px">
      ${cl.map((item,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <input type="checkbox" id="nc-${i}" ${item.done?'checked':''}>
        <input class="inp" id="nt-${i}" value="${item.text}" style="flex:1;font-size:13px;padding:6px 10px" placeholder="Item…">
        <button onclick="this.parentElement.remove()" style="background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;padding:4px">×</button>
      </div>`).join('')}
    </div>
    <button onclick="addCLItem()" style="font-size:12px;color:${T.sage};background:none;border:1px dashed ${T.sageMid};border-radius:8px;padding:4px 10px;cursor:pointer;font-weight:600;margin-bottom:14px">+ Checklist item</button>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${NOTE_COLORS.map(c=>`<div onclick="document.querySelectorAll('.ncs').forEach(s=>s.style.outline='none');this.style.outline='3px solid ${T.sage}';document.getElementById('ne-col').value='${c}'" class="ncs" style="width:22px;height:22px;border-radius:50%;background:${c};cursor:pointer;outline:${(note?.color||NOTE_COLORS[0])===c?'3px solid '+T.sage:'none'};outline-offset:2px"></div>`).join('')}
      <input type="hidden" id="ne-col" value="${note?.color||NOTE_COLORS[0]}">
    </div>
    <div class="grid2">
      <div class="form-row" style="margin:0"><label class="lbl">Group</label>
        <select class="sel" id="ne-grp">
          <option value="">No group</option>
          <option value="__new__">+ New Group…</option>
          ${groups.map(g=>`<option value="${g.id}"${note?.group_id===g.id?' selected':''}>${g.name}</option>`).join('')}
        </select></div>
      <div class="form-row" style="margin:0"><label class="lbl">Member</label>
        <select class="sel" id="ne-mem"><option value="">Family</option>${A.members.map(m=>`<option value="${m.id}"${note?.member_id===m.id?' selected':''}>${m.name}</option>`).join('')}</select></div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:16px;cursor:pointer">
      <input type="checkbox" id="ne-pin" ${note?.pinned?'checked':''}> 📌 Pin this note
    </label>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1" onclick="saveNote('${noteId||''}')">Save</button>
      ${noteId?`<button class="btn btn-danger" onclick="delNote('${noteId}')">🗑</button>`:''}
    </div>`);
  // Handle "New Group" selection - use in-app modal instead of browser prompt
  document.getElementById('ne-grp').addEventListener('change',function(){
    if(this.value==='__new__'){
      const sel=this;
      sel.value=''; // Reset while modal is open
      // Show in-app modal
      const overlay=document.createElement('div');
      overlay.style.cssText='position:fixed;inset:0;background:rgba(20,18,14,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px';
      overlay.innerHTML=`<div style="background:#fff;border-radius:16px;padding:22px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
        <div style="font-family:Playfair Display,serif;font-size:17px;color:#1e1b16;margin-bottom:14px">New Group</div>
        <input id="ng-inline-name" class="inp" placeholder="Group name e.g. 🏠 Household" autofocus style="margin-bottom:14px">
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" style="flex:1" onclick="
            const n=document.getElementById('ng-inline-name').value.trim();
            if(!n||!A.family)return;
            sb.from('note_groups').insert({family_id:A.family.id,name:n}).select().single().then(({data})=>{
              if(data){
                A.noteGroups.push(data);
                const opt=document.createElement('option');
                opt.value=data.id;opt.textContent=data.name;opt.selected=true;
                sel.insertBefore(opt,sel.querySelector('option[value=\'__new__\']'));
                sel.value=data.id;
                toast('Group created!');
              }
              document.body.removeChild(overlay);
            });
          ">Create</button>
          <button class="btn btn-secondary" style="flex:1" onclick="document.body.removeChild(this.closest('[style*=fixed]'))">Cancel</button>
        </div>
      </div>`;
      document.body.appendChild(overlay);
      setTimeout(()=>document.getElementById('ng-inline-name')?.focus(),50);
    }
  });
}
window.openNote=openNote;

function addCLItem(){
  const cont=document.getElementById('ne-cl');
  const i=cont.children.length;
  const div=document.createElement('div');
  div.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px';
  div.innerHTML=`<input type="checkbox" id="nc-${i}"><input class="inp" id="nt-${i}" style="flex:1;font-size:13px;padding:6px 10px" placeholder="Item…"><button onclick="this.parentElement.remove()" style="background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;padding:4px">×</button>`;
  cont.appendChild(div);
  div.querySelector('input[type="text"],input:not([type="checkbox"])').focus();
  // Enter key adds next item
  div.querySelector('input:not([type="checkbox"])').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addCLItem();}});
}
window.addCLItem=addCLItem;

async function saveNote(noteId){
  if(!A.family){toast('Set up your family first.',true);return;}
  const checklist=[];
  document.querySelectorAll('#ne-cl > div').forEach((row,i)=>{
    const cb=row.querySelector('input[type="checkbox"]');
    const inp=row.querySelector('input:not([type="checkbox"])');
    if(inp?.value?.trim())checklist.push({id:'c'+i,text:inp.value.trim(),done:cb?.checked||false});
  });
  const grpVal=document.getElementById('ne-grp')?.value;
  const data={
    family_id:A.family.id,
    title:document.getElementById('ne-t')?.value||'',
    content:document.getElementById('ne-c')?.value||'',
    color:document.getElementById('ne-col')?.value||NOTE_COLORS[0],
    group_id:grpVal&&grpVal!=='__new__'?grpVal:null,
    member_id:document.getElementById('ne-mem')?.value||null,
    pinned:document.getElementById('ne-pin')?.checked||false,
    checklist,
  };
  let res;
  if(noteId)res=await sb.from('notes').update(data).eq('id',noteId).select().single();
  else res=await sb.from('notes').insert(data).select().single();
  if(res.error){toast('Error saving note.',true);console.error(res.error);return;}
  if(noteId)A.notes=A.notes.map(n=>n.id===noteId?res.data:n);
  else A.notes.push(res.data);
  closeModal();toast(noteId?'Note updated!':'Note saved!');renderNB();
}
window.saveNote=saveNote;

async function delNote(id){
  if(!confirm('Delete this note?'))return;
  await sb.from('notes').delete().eq('id',id);
  A.notes=A.notes.filter(n=>n.id!==id);
  closeModal();toast('Note deleted.');renderNB();
}
window.delNote=delNote;

// ── MEDS ──────────────────────────────────────────────────────────────────────
function renderMeds(){
  const dm=A.dailyMeds,om=A.occMeds,s=symC();
  const daysLeft=med=>{const td=(med.member_ids||[]).length*(med.dose_per_day||1);if(!td)return null;return Math.floor((med.stock_today||0)/td);};
  const lastsUntil=med=>{const d=daysLeft(med);return d===null?'—':fmt(addDays(todayD(),d));};
  const updStock=med=>(med.stock_today||0)+((parseInt(med.new_order_pkgs)||0)*(med.units_per_pkg||0));
  const updUntil=med=>{const td=(med.member_ids||[]).length*(med.dose_per_day||1);if(!td||!med.new_order_pkgs)return'—';return fmt(addDays(todayD(),Math.floor(updStock(med)/td)));};
  const orderPrice=med=>((parseInt(med.new_order_pkgs)||0)*(med.price_per_pkg||0)).toFixed(2);
  const expDays=d=>Math.floor((new Date(d)-new Date())/(1000*60*60*24));
  const expSt=d=>{const n=expDays(d);if(n<0)return'expired';if(n<30)return'critical';if(n<90)return'soon';return'ok';};
  const totalOrder=dm.reduce((sum,m)=>sum+(parseInt(m.new_order_pkgs)||0)*(m.price_per_pkg||0),0);
  const grand=(totalOrder+(parseFloat(A.family?.transport_cost)||0)).toFixed(2);

  document.getElementById('page-meds').innerHTML=`
    <div class="page-header">
      <div class="family-label">${A.family?.name||''}</div>
      <div class="page-title">Meds & Supplies</div>
    </div>
    <div style="padding:10px 16px 0;display:flex;gap:8px;align-items:center">
      <select class="sel" style="width:auto;font-size:12px" onchange="updateCurrency(this.value)">
        ${CURRENCIES.map(c=>`<option value="${c.code}"${(A.family?.currency||'EUR')===c.code?' selected':''}>${c.code} (${c.sym})</option>`).join('')}
      </select>
      <span style="font-size:12px;color:${T.muted}">All prices in ${s}</span>
    </div>

    <div style="padding:14px 16px 0">
      <div style="font-family:'Playfair Display',serif;font-size:17px;color:${T.ink};margin-bottom:10px">Daily Medications</div>
      ${dm.length===0?`<div style="color:${T.muted};font-size:13px;margin-bottom:10px;font-style:italic">No daily medications added yet.</div>`:''}
      <div style="overflow-x:auto;border-radius:13px;border:1px solid ${T.border};background:${T.surface}">
        <table class="tbl">
          <thead><tr>${['Medication','Members','Dose/day','Pkg units','Pkg price','In stock','Lasts until','New order','Order cost','Updated until',''].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            ${dm.map((med,idx)=>{
              const dl=daysLeft(med);
              const st=dl===null?'ok':dl<=7?'critical':dl<=14?'low':'ok';
              const rowMems=A.members.filter(m=>(med.member_ids||[]).includes(m.id));
              return`<tr>
                <td><div style="font-weight:700">${med.name}</div>${med.shared?`<span class="chip" style="background:${T.skyLight};color:${T.sky};font-size:10px">Shared</span>`:''}<div style="font-size:11px;color:${T.muted}">${med.note||''}</div></td>
                <td><div style="display:flex;gap:3px">${rowMems.map(m=>av(m,20)).join('')}</div></td>
                <td>${med.dose_per_day}</td>
                <td>${med.units_per_pkg}</td>
                <td>${s}${(med.price_per_pkg||0).toFixed(2)}</td>
                <td style="font-weight:700;color:${st==='critical'?T.rose:st==='low'?T.honey:T.sage}">
                  ${med.stock_today}
                  ${st==='critical'?`<div style="font-size:10px;color:${T.rose}">⚠️ Low!</div>`:''}
                  ${st==='low'?`<div style="font-size:10px;color:${T.honey}">Soon</div>`:''}
                </td>
                <td style="color:${st==='critical'?T.rose:st==='low'?T.honey:T.muted}">${lastsUntil(med)}</td>
                <td><input type="number" min="0" value="${med.new_order_pkgs||''}" placeholder="0" onfocus="if(this.value==='0')this.value=''" onchange="updateMedOrder('${med.id}',this.value)" style="width:55px;padding:4px 6px;border-radius:7px;border:1px solid ${T.border};font-size:13px;text-align:center"></td>
                <td style="font-weight:600;color:${T.sage}">${med.new_order_pkgs&&med.new_order_pkgs!=='0'?`${s}${orderPrice(med)}`:'—'}</td>
                <td style="font-weight:600;color:${T.sage};font-size:12px">${med.new_order_pkgs&&med.new_order_pkgs!=='0'?updUntil(med):'—'}</td>
                <td>
                  ${med.new_order_pkgs&&med.new_order_pkgs!=='0'?`<button onclick="confirmOrder('${med.id}')" style="background:${T.sageLight};border:1px solid ${T.sageMid};border-radius:7px;padding:3px 8px;font-size:11px;font-weight:700;color:${T.sage};cursor:pointer;white-space:nowrap">✓ Got it</button>`:''}
                  <button onclick="delDM('${med.id}')" style="background:none;border:none;color:${T.muted};cursor:pointer;font-size:14px;margin-left:4px">🗑</button>
                </td>
              </tr>`;
            }).join('')}
            <tr style="background:${T.parchment}">
              <td colspan="7" style="font-weight:800;color:${T.ink}">
                Grand Total
                <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
                  <span style="font-size:11px;color:${T.muted};font-weight:600">+ Transport:</span>
                  <input type="number" value="${A.family?.transport_cost||0}" onfocus="this.select()" onchange="updateTransport(this.value)" style="width:65px;padding:3px 6px;border-radius:7px;border:1px solid ${T.border};font-size:12px">
                  <span style="font-size:11px;color:${T.muted}">${s}</span>
                </div>
              </td>
              <td colspan="4" style="font-weight:800;color:${T.sage};font-size:16px">${s}${grand}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="openAddDM()">+ Add medication</button>
    </div>

    <div style="padding:18px 16px 0">
      <div style="font-family:'Playfair Display',serif;font-size:17px;color:${T.ink};margin-bottom:10px">Occasional Medications</div>
      <div style="overflow-x:auto;border-radius:13px;border:1px solid ${T.border};background:${T.surface}">
        <table class="tbl">
          <thead><tr>${['Medication','In stock','Last counted','Expiry','Note',''].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            ${om.map(med=>{
              const es=med.expiry?expSt(med.expiry):'ok';
              const ed=med.expiry?expDays(med.expiry):null;
              return`<tr>
                <td style="font-weight:700">${med.name}</td>
                <td><input type="number" value="${med.stock}" onfocus="this.select()" onchange="updateOccStock('${med.id}',this.value)" style="width:60px;padding:4px 6px;border-radius:7px;border:1px solid ${T.border};font-size:13px;text-align:center"></td>
                <td style="color:${T.muted};font-size:12px">${fmt(med.last_count)}</td>
                <td style="font-weight:${es!=='ok'?700:400};color:${es==='ok'?T.muted:T.rose}">
                  ${fmt(med.expiry)}
                  ${es==='expired'?`<div style="font-size:10px;color:${T.rose}">❌ EXPIRED</div>`:''}
                  ${es==='critical'?`<div style="font-size:10px;color:${T.rose}">⚠️ ${ed}d left</div>`:''}
                  ${es==='soon'?`<div style="font-size:10px;color:${T.honey}">⏳ ${ed}d left</div>`:''}
                </td>
                <td style="color:${T.muted};font-size:12px">${med.note||''}</td>
                <td><button onclick="delOM('${med.id}')" style="background:none;border:none;color:${T.muted};cursor:pointer;font-size:14px">🗑</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="openAddOM()">+ Add occasional med</button>
    </div>`;
}

async function updateCurrency(code){
  if(!A.family)return;
  const{data}=await sb.from('families').update({currency:code}).eq('id',A.family.id).select().single();
  if(data){A.family=data;renderMeds();}
}
window.updateCurrency=updateCurrency;

async function updateTransport(val){
  if(!A.family)return;
  await sb.from('families').update({transport_cost:parseFloat(val)||0}).eq('id',A.family.id);
  if(A.family)A.family.transport_cost=parseFloat(val)||0;
}
window.updateTransport=updateTransport;

async function updateMedOrder(id,val){
  const{data}=await sb.from('daily_meds').update({new_order_pkgs:parseInt(val)||0}).eq('id',id).select().single();
  if(data){A.dailyMeds=A.dailyMeds.map(m=>m.id===id?data:m);renderMeds();}
}
window.updateMedOrder=updateMedOrder;

async function confirmOrder(id){
  const med=A.dailyMeds.find(m=>m.id===id);if(!med)return;
  const ns=(med.stock_today||0)+((parseInt(med.new_order_pkgs)||0)*(med.units_per_pkg||0));
  const{data}=await sb.from('daily_meds').update({stock_today:ns,new_order_pkgs:0}).eq('id',id).select().single();
  if(data){A.dailyMeds=A.dailyMeds.map(m=>m.id===id?data:m);toast('Stock updated! ✅');renderMeds();}
}
window.confirmOrder=confirmOrder;

async function updateOccStock(id,val){
  const{data}=await sb.from('occasional_meds').update({stock:parseInt(val)||0,last_count:new Date().toISOString()}).eq('id',id).select().single();
  if(data)A.occMeds=A.occMeds.map(m=>m.id===id?data:m);
}
window.updateOccStock=updateOccStock;

async function delDM(id){if(!confirm('Remove?'))return;await sb.from('daily_meds').delete().eq('id',id);A.dailyMeds=A.dailyMeds.filter(m=>m.id!==id);toast('Removed.');renderMeds();}
window.delDM=delDM;
async function delOM(id){if(!confirm('Remove?'))return;await sb.from('occasional_meds').delete().eq('id',id);A.occMeds=A.occMeds.filter(m=>m.id!==id);toast('Removed.');renderMeds();}
window.delOM=delOM;

    </label>
    <button class="btn btn-primary btn-full" onclick="saveDM()">Add Medication</button>`);

window.openAddDM=openAddDM;

async function saveDM(){
  if(!A.family)return;
  const memberIds=Array.from(document.querySelectorAll('#dm-mems button[data-sel="true"]')).map(b=>b.dataset.mid).filter(Boolean);
  const name=document.getElementById('dm-n')?.value?.trim();
  if(!name){toast('Please add a name.',true);return;}
  const data={
    family_id:A.family.id,name,member_ids:memberIds,
    dose_per_day:parseFloat(document.getElementById('dm-d')?.value)||1,
    units_per_pkg:parseInt(document.getElementById('dm-u')?.value)||30,
    price_per_pkg:parseFloat(document.getElementById('dm-p')?.value)||0,
    stock_today:parseInt(document.getElementById('dm-s')?.value)||0,
    shared:document.getElementById('dm-sh')?.checked||false,
    note:document.getElementById('dm-note')?.value||'',
  };
  const{data:result,error}=await sb.from('daily_meds').insert(data).select().single();
  if(error){toast('Error adding medication.',true);console.error(error);return;}
  A.dailyMeds.push(result);closeModal();toast('Medication added!');renderMeds();
}
window.saveDM=saveDM;

}
window.openAddOM=openAddOM;

async function saveOM(){

window.saveOM=saveOM;

// ── INSIGHTS ──────────────────────────────────────────────────────────────────
function renderInsights(){
  const wLogs=A.events.filter(e=>e.type==='wellness');
  const hEvs=A.events.filter(e=>e.type==='health');
  const avg=(arr,k)=>{const v=arr.map(e=>parseFloat(e[k])).filter(v=>!isNaN(v)&&v>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};

  // Pick challenge based on week number
  const weekNum=Math.floor((new Date()-new Date(new Date().getFullYear(),0,1))/(7*24*60*60*1000));
  const challenge=CHALLENGES[weekNum%CHALLENGES.length];
  const insights=genInsights(wLogs,hEvs);

  const memberCards=A.members.map(member=>{
    const logs=wLogs.filter(e=>e.member_id===member.id);
    if(!logs.length)return'';
    const aSlp=avg(logs,'sleep'),aEn=avg(logs,'energy'),aHy=avg(logs,'hydration');
    const exDays=logs.filter(l=>l.exercised).length;
    const acts={};logs.filter(l=>l.exercised&&l.activity).forEach(l=>{acts[l.activity]=(acts[l.activity]||0)+1;});
    const topAct=Object.entries(acts).sort((a,b)=>b[1]-a[1])[0]?.[0];
    const ill=hEvs.filter(e=>(e.participants||[]).includes(member.id)&&e.appt_type==='Illness').length;
    return`<div class="card" style="margin-bottom:12px;overflow:hidden">
      <div style="padding:12px 14px;border-bottom:1px solid ${T.border};display:flex;align-items:center;gap:10px">
        ${av(member,36)}<div><div style="font-weight:800;font-size:14px">${member.name}</div><div style="font-size:11px;color:${T.muted}">${logs.length} logs recorded</div></div>
      </div>
      <div style="padding:12px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${[['😴','Sleep',aSlp?`${aSlp.toFixed(1)}h`:'-',aSlp&&aSlp>=7,aSlp&&aSlp<6],
           ['⚡','Energy',aEn?`${Math.round(aEn)}%`:'-',aEn&&aEn>=70,aEn&&aEn<50],
           ['💧','H₂O',aHy?`${Math.round(aHy)}ml`:'-',aHy&&aHy>=1800,aHy&&aHy<1200],
           ['🏃','Exercise',`${exDays}/${logs.length}`,exDays/Math.max(logs.length,1)>=0.5,false]
        ].map(([ic,lb,val,good,warn])=>`
          <div style="background:${good?T.sageLight:warn?T.roseLight:T.parchment};border-radius:9px;padding:7px 8px;text-align:center">
            <div style="font-size:15px">${ic}</div>
            <div style="font-size:12px;font-weight:800;color:${good?T.sage:warn?T.rose:T.ink}">${val}</div>
            <div style="font-size:9px;color:${T.muted};font-weight:700;text-transform:uppercase">${lb}</div>
          </div>`).join('')}
        ${topAct?`<div style="background:${T.parchment};border-radius:9px;padding:7px 8px;text-align:center"><div style="font-size:15px">🏅</div><div style="font-size:12px;font-weight:800;color:${T.ink}">${topAct}</div><div style="font-size:9px;color:${T.muted};font-weight:700;text-transform:uppercase">Top Activity</div></div>`:''}
        ${ill>0?`<div style="background:${T.roseLight};border-radius:9px;padding:7px 8px;text-align:center"><div style="font-size:15px">🤒</div><div style="font-size:12px;font-weight:800;color:${T.rose}">${ill}</div><div style="font-size:9px;color:${T.muted};font-weight:700;text-transform:uppercase">Illnesses</div></div>`:''}
      </div>
      ${aSlp?`<div style="padding:0 14px 12px">
        <div style="font-size:10px;color:${T.muted};font-weight:700;margin-bottom:3px">Sleep vs 8h goal</div>
        <div style="background:${T.parchment};border-radius:99px;height:6px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100,(aSlp/8)*100)}%;background:${aSlp>=7?T.sage:aSlp>=6?T.honey:T.rose};border-radius:99px"></div>
        </div>
      </div>`:''}
    </div>`;
  }).join('');

  document.getElementById('page-insights').innerHTML=`
    <div class="page-header">
      <div class="family-label">${A.family?.name||''}</div>
      <div class="page-title">Insights</div>
    </div>
    <div style="padding:12px 16px 0">
      <div style="background:linear-gradient(135deg,${T.sage},${T.sageMid});border-radius:17px;padding:18px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden">
        <div style="position:absolute;right:-10px;top:-10px;font-size:68px;opacity:.12">🌿</div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.8;margin-bottom:5px">This Week's Family Challenge</div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;margin-bottom:8px;line-height:1.3">${challenge.title}</div>
        <div style="font-size:13px;opacity:.9;line-height:1.6;margin-bottom:10px">${challenge.body}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${challenge.tips.map(t=>`<span style="background:rgba(255,255,255,.2);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600">💡 ${t}</span>`).join('')}</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${[{l:'Wellness Logs',v:wLogs.length,ic:'📋',c:T.sage,bg:T.sageLight},
           {l:'Health Events',v:hEvs.length,ic:'❤️',c:T.rose,bg:T.roseLight},
           {l:'Illnesses',v:hEvs.filter(e=>e.appt_type==='Illness').length,ic:'🤒',c:T.terra,bg:T.terraLight},
           {l:'Exercise Days',v:wLogs.filter(e=>e.exercised).length,ic:'🏃',c:T.sky,bg:T.skyLight}
        ].map(s=>`<div class="card" style="padding:12px;background:${s.bg};border:none;text-align:center">
          <div style="font-size:22px;margin-bottom:3px">${s.ic}</div>
          <div style="font-size:22px;font-weight:800;color:${s.c};font-family:'Playfair Display',serif">${s.v}</div>
          <div style="font-size:10px;color:${T.muted};font-weight:700;text-transform:uppercase;letter-spacing:.04em">${s.l}</div>
        </div>`).join('')}
      </div>

      ${wLogs.length===0?`<div class="card" style="padding:20px;text-align:center;color:${T.muted};margin-bottom:16px">
        <div style="font-size:32px;margin-bottom:8px">🌿</div>
        <div style="font-weight:700;margin-bottom:5px">No wellness data yet</div>
        <div style="font-size:13px">Add Wellness Logs in the Calendar to see personalised insights here.</div>
      </div>`:memberCards}

      <div style="font-family:'Playfair Display',serif;font-size:17px;color:${T.ink};margin-bottom:12px">Smart Observations</div>
      ${insights.map(ins=>`<div class="card" style="padding:12px 14px;margin-bottom:10px;border-left:4px solid ${ins.color}">
        <div style="font-size:16px;margin-bottom:3px">${ins.icon}</div>
        <div style="font-weight:700;font-size:13px;margin-bottom:2px">${ins.title}</div>
        <div style="font-size:12px;color:${T.muted};line-height:1.5">${ins.body}</div>
      </div>`).join('')}
    </div>`;
}

function genInsights(wLogs,hEvs){
  const ins=[];
  const avg=(arr,k)=>{const v=arr.map(e=>parseFloat(e[k])).filter(v=>!isNaN(v)&&v>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};
  A.members.forEach(m=>{
    const logs=wLogs.filter(e=>e.member_id===m.id);
    if(logs.length<2)return;
    const aSlp=avg(logs,'sleep'),aHy=avg(logs,'hydration'),aEn=avg(logs,'energy');
    const exPct=logs.filter(l=>l.exercised).length/logs.length;
    if(aSlp&&aSlp<7)ins.push({icon:'😴',title:`${m.name} is sleeping less than recommended`,body:`Average sleep is ${aSlp.toFixed(1)}h — the goal is 7–9h. Even 30 extra minutes can improve mood and energy significantly!`,color:T.honey});
    if(aHy&&aHy<1500)ins.push({icon:'💧',title:`${m.name} could drink more water`,body:`Average hydration is ${Math.round(aHy)}ml/day. Aim for 1800ml+. A visible water bottle nearby is a surprisingly effective habit.`,color:T.sky});
    if(exPct<0.3&&logs.length>=3)ins.push({icon:'🏃',title:`${m.name}'s exercise consistency has room to grow`,body:`Only ${Math.round(exPct*100)}% of logged days included exercise. Even a 15-minute walk makes a real difference!`,color:T.sage});
    if(aEn&&aEn<55)ins.push({icon:'⚡',title:`${m.name}'s energy levels seem low`,body:`Average energy is ${Math.round(aEn)}%. This often links to sleep or hydration — two quick wins if improved together.`,color:T.plum});
  });
  const ill=hEvs.filter(e=>e.appt_type==='Illness');
  if(ill.length>=2)ins.push({icon:'🤒',title:`${ill.length} illness events recorded`,body:`Worth checking if these are recurring for the same person. Vitamin D, zinc, and consistent sleep all support immunity.`,color:T.rose});
  if(!ins.length)ins.push({icon:'🌟',title:'Looking great overall!',body:"No major concerns in your family's wellness data. Keep logging consistently for richer, more personalised insights over time.",color:T.sage});
  return ins;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────

  const fam=A.family,members=A.members;
  const TABS=[{id:'family',label:'👨‍👩‍👧‍👦 Family'},{id:'calendar',label:'🗓 Calendar'},{id:'notifs',label:'🔔 Notifications'}];
  let tc='';

  if(A.settingsTab==='family'){
    tc=`
      <div class="card" style="padding:14px;margin-bottom:12px">
        <div class="lbl" style="margin-bottom:8px">Family Name</div>
        <div style="display:flex;gap:8px">
          <input class="inp" id="s-fn" value="${fam?.name||''}" style="flex:1;font-size:15px;font-weight:700" placeholder="Family name">
          <button class="btn btn-primary btn-sm" onclick="saveFamName()">Save</button>
        </div>
      </div>
      <div class="card" style="padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="lbl">Family Members</div>
          <button class="btn btn-primary btn-sm" onclick="openAddMem()">+ Add Member</button>
        </div>
        ${members.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid ${T.border}">
          ${av(m,40)}
          <div style="flex:1">
            <div style="font-weight:700;font-size:14px">${m.name}</div>
            <div style="font-size:12px;color:${T.muted}">${m.role||''}${m.age?` · Age ${m.age}`:''}${m.gender?` · ${m.gender}`:''}</div>
            ${m.email?`<div style="font-size:11px;color:${T.sky}">${m.email}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
            ${m.is_owner?`<span class="chip" style="background:${T.sageLight};color:${T.sage}">Owner</span>`:''}
            ${m.email&&!m.user_id?`<button onclick="sendInvite('${m.email}','${m.id}')" class="btn btn-primary btn-sm">📧 Invite</button>`:''}
          </div>
        </div>`).join('')}
      </div>`;
  } else if(A.settingsTab==='calendar'){
    tc=`<div class="card" style="padding:14px">
      <div class="lbl" style="margin-bottom:10px">Custom Tags</div>
      <p style="font-size:12px;color:${T.muted};margin-bottom:12px">These tags appear when creating calendar entries, letting you quickly categorise and search events.</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${(fam?.tags||[]).map(t=>`<div style="display:flex;align-items:center;gap:4px;background:${T.sageLight};border-radius:99px;padding:4px 10px">
          <span style="font-size:13px;font-weight:600;color:${T.sage}">${t}</span>
          <button onclick="removeTag('${t}')" style="background:none;border:none;color:${T.sageMid};font-size:14px;cursor:pointer;line-height:1;padding:0 2px">×</button>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <input class="inp" id="s-tag" placeholder="Add new tag…" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addFamTag();}">
        <button class="btn btn-primary btn-sm" onclick="addFamTag()">Add</button>
      </div>
    </div>`;
  } else {
    tc=`<div class="card" style="padding:14px">
      <div class="lbl" style="margin-bottom:12px">Reminder Timing</div>
      ${[['notif_week_before','1 week before'],['notif_day_before','1 day before'],['notif_hour_before','1 hour before'],['notif_ten_min','10 minutes before']].map(([key,label])=>`
        <label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid ${T.border};cursor:pointer">
          <input type="checkbox" ${fam?.[key]?'checked':''} onchange="updateNotif('${key}',this.checked)">
          <span style="font-size:14px;font-weight:600">${label}</span>
        </label>`).join('')}
      <p style="font-size:12px;color:${T.muted};margin-top:12px;line-height:1.5">Push notifications are available in the native mobile app. Settings are saved and will apply when the app launches.</p>
    </div>`;
  }

  document.getElementById('page-settings').innerHTML=`
    <div class="page-header">
      <div class="family-label">${fam?.name||''}</div>
      <div class="page-title">Settings</div>
    </div>
    <div class="tabs">${TABS.map(t=>`<button class="tab ${A.settingsTab===t.id?'active':''}" onclick="A.settingsTab='${t.id}';renderSettings()">${t.label}</button>`).join('')}</div>
    <div style="padding:14px 16px">${tc}</div>`;

async function saveFamName(){
  const name=document.getElementById('s-fn')?.value?.trim();
  if(!name||!A.family){toast('Please enter a family name.',true);return;}
  const{data,error}=await sb.from('families').update({name}).eq('id',A.family.id).select().single();
  if(error){toast('Error saving.',true);console.error(error);return;}
  A.family=data;
  document.getElementById('fam-badge').textContent=data.name;
  toast('Family name saved! ✅');renderSettings();
}
window.saveFamName=saveFamName;

async function addFamTag(){
  const inp=document.getElementById('s-tag');
  const val=inp?.value?.trim().toLowerCase();
  if(!val||!A.family){return;}
  const tags=[...new Set([...(A.family.tags||[]),val])];
  const{data,error}=await sb.from('families').update({tags}).eq('id',A.family.id).select().single();
  if(error){toast('Error saving tag.',true);console.error(error);return;}
  A.family=data;toast('Tag added!');renderSettings();
}
window.addFamTag=addFamTag;

async function removeTag(tag){
  if(!A.family)return;
  const tags=(A.family.tags||[]).filter(t=>t!==tag);
  const{data,error}=await sb.from('families').update({tags}).eq('id',A.family.id).select().single();
  if(error){toast('Error removing tag.',true);return;}
  A.family=data;renderSettings();
}
window.removeTag=removeTag;

async function updateNotif(key,val){
  if(!A.family)return;
  const{data,error}=await sb.from('families').update({[key]:val}).eq('id',A.family.id).select().single();
  if(error){toast('Error saving.',true);console.error(error);return;}
  A.family=data;toast('Saved!');
}
window.updateNotif=updateNotif;

function openAddMem(){
  showModal('Add Family Member',`
    <div class="grid2">
      <div class="form-row" style="margin:0"><label class="lbl">Name *</label><input class="inp" id="nm-n" placeholder="Name" autofocus></div>
      <div class="form-row" style="margin:0"><label class="lbl">Role</label><input class="inp" id="nm-r" placeholder="Parent, Child…"></div>
      <div class="form-row" style="margin:0"><label class="lbl">Age</label><input class="inp" type="number" id="nm-a" placeholder="Age" onfocus="this.select()"></div>
      <div class="form-row" style="margin:0"><label class="lbl">Gender</label>
        <select class="sel" id="nm-g"><option value="">Select</option>${['Male','Female','Non-binary','Prefer not to say'].map(g=>`<option>${g}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row"><label class="lbl">Email (for invite)</label><input class="inp" type="email" id="nm-e" placeholder="their@email.com"></div>
    <div style="display:flex;gap:6px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
      <span class="lbl" style="margin:0">Colour:</span>
      ${MCOLORS.map((c,i)=>`<div onclick="document.querySelectorAll('.mcs').forEach(s=>s.style.outline='none');this.style.outline='3px solid ${T.ink}';document.getElementById('nm-c').value='${c}'" class="mcs" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;outline:${i===0?'3px solid '+T.ink:'none'};outline-offset:2px"></div>`).join('')}
      <input type="hidden" id="nm-c" value="${MCOLORS[0]}">
    </div>
    <button class="btn btn-primary btn-full" onclick="saveMem()">Add Member</button>
    <p style="font-size:12px;color:${T.muted};margin-top:10px;text-align:center">If you add an email, you'll be able to send them an invite to join your family hub.</p>`);
}
window.openAddMem=openAddMem;

async function saveMem(){
  if(!A.family)return;
  const name=document.getElementById('nm-n')?.value?.trim();
  if(!name){toast('Please add a name.',true);return;}
  const email=document.getElementById('nm-e')?.value?.trim()||null;
  const data={
    family_id:A.family.id,name,
    role:document.getElementById('nm-r')?.value||'',
    age:parseInt(document.getElementById('nm-a')?.value)||null,
    gender:document.getElementById('nm-g')?.value||null,
    email,color:document.getElementById('nm-c')?.value||MCOLORS[0],
    avatar:name[0].toUpperCase(),is_owner:false,
  };
  const{data:result,error}=await sb.from('family_members').insert(data).select().single();
  if(error){toast('Error adding member.',true);console.error(error);return;}
  A.members.push(result);
  closeModal();toast(`${name} added! ✅`);
  if(email&&confirm(`Send an invite to ${email} to join ${A.family.name}?`))sendInvite(email,result.id);
  else renderSettings();
}
window.saveMem=saveMem;

async function sendInvite(email,memberId){
  if(!A.family)return;
  const{data,error}=await sb.from('invitations').insert({family_id:A.family.id,email}).select().single();
  if(error){console.error('Invite error',error);}
  const token=data?.token||'demo';
  const link=`${window.location.origin}${window.location.pathname}?invite=${token}`;
  showModal('Invite Sent 📧',`
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:42px;margin-bottom:12px">📧</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">Invite link ready!</div>
      <div style="font-size:13px;color:${T.muted};margin-bottom:14px">Share this link with <b>${email}</b> to give them access to <b>${A.family.name}</b>.</div>
      <div style="background:${T.parchment};border-radius:9px;padding:10px;font-size:11px;word-break:break-all;color:${T.ink};margin-bottom:14px;text-align:left">${link}</div>
      <button class="btn btn-primary btn-full" onclick="navigator.clipboard?.writeText('${link}').then(()=>toast('Link copied! 📋'))">📋 Copy invite link</button>
      <div style="font-size:11px;color:${T.muted};margin-top:12px">In the full app, this will be sent automatically by email.</div>
    </div>`);
}
window.sendInvite=sendInvite;

// ── BOOT ──────────────────────────────────────────────────────────────────────
function showAuth(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('root').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

async function handleSession(session){
  try{
    if(session?.user){
      document.getElementById('auth-screen').style.display='none';
      await initApp(session.user);
    } else {
      showAuth();
    }
  }catch(e){
    console.error('Session error',e);
    showAuth();
  }
}

async function boot(){
  if(!sb){
    document.getElementById('loading-screen').innerHTML=`<div style="text-align:center;padding:40px;font-family:sans-serif">
      <div style="font-size:40px;margin-bottom:16px">⚠️</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Failed to connect</div>
      <div style="font-size:13px;color:#7a7060;margin-bottom:16px">Could not initialise the database connection.</div>
      <button onclick="location.reload()" style="padding:10px 20px;background:#5e8b62;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">Retry</button>
    </div>`;
    return;
  }
  // Immediately check existing session — avoids blank screen on first load
  const { data:{ session } } = await sb.auth.getSession();
  await handleSession(session);
  // Also listen for future auth changes (login/logout)
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN') await handleSession(session);
    if(event==='SIGNED_OUT') showAuth();
  });
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>

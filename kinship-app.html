<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌿 Kinship — Family Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
// Load Supabase with fallback
function loadScript(src, fallback, cb) {
  const s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = () => { const f = document.createElement('script'); f.src = fallback; f.onload = cb; f.onerror = () => { document.getElementById('loading-screen').innerHTML = '<div style="text-align:center;padding:40px;font-family:sans-serif"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Connection Error</div><div style="font-size:13px;color:#7a7060">Please check your internet connection and refresh the page.</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#5e8b62;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">Retry</button></div>'; }; document.head.appendChild(f); };
  document.head.appendChild(s);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#5e8b62;--sage-mid:#8ab88e;--sage-light:#d4e8d6;
  --terra:#b85c38;--terra-light:#f2ddd4;
  --sky:#3a7ca5;--sky-light:#d0e4f0;
  --plum:#7c5c8a;--plum-light:#e8d8f0;
  --honey:#c4892a;--honey-light:#f5e4c4;
  --rose:#b85070;--rose-light:#f0d4de;
  --ink:#1e1b16;--muted:#7a7060;--border:#e0d8cc;
  --bg:#f5f2ed;--surface:#fff;--parchment:#ede8df;
}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink)}
button,input,select,textarea{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:2px solid var(--sage);outline-offset:1px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#c8bfb0;border-radius:4px}

/* Layout */
#root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative}
.top-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.top-logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--sage)}
.content{flex:1;overflow-y:auto;padding-bottom:70px}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 12px;flex-shrink:0;position:sticky;bottom:0;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--sage)}
.nav-dot{width:0;height:3px;border-radius:2px;background:var(--sage);transition:width .2s;margin-top:1px}
.nav-btn.active .nav-dot{width:18px}
.nav-icon{font-size:20px;line-height:1}

/* Pages */
.page{display:none;flex-direction:column}
.page.active{display:flex}
.page-header{padding:14px 16px 0;flex-shrink:0}
.family-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.page-title{font-size:22px;font-weight:700;color:var(--ink);display:flex;align-items:center;justify-content:space-between;font-family:'Playfair Display',serif}

/* Cards */
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.05)}

/* Buttons */
.btn{border:none;border-radius:10px;font-weight:700;font-size:13px;padding:8px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:var(--sage);color:#fff}
.btn-primary:hover{background:#4a7050}
.btn-secondary{background:var(--parchment);color:var(--muted);border:1px solid var(--border)}
.btn-danger{background:var(--rose-light);color:var(--rose);border:1px solid #b8507044}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:14px}
.btn-full{width:100%;justify-content:center}

/* Forms */
.inp{border:1.5px solid var(--border);border-radius:9px;padding:8px 11px;font-size:13px;color:var(--ink);width:100%;background:var(--surface)}
.sel{border:1.5px solid var(--border);border-radius:9px;padding:8px 11px;font-size:13px;color:var(--ink);width:100%;background:var(--surface)}
.lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,18,14,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.22,.68,0,1.2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink)}
.modal-close{background:var(--parchment);border:none;border-radius:8px;width:28px;height:28px;font-size:17px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:15px 18px 28px;flex:1}

/* Auth screen */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:var(--surface);border-radius:20px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.auth-logo{font-family:'Playfair Display',serif;font-size:28px;color:var(--sage);text-align:center;margin-bottom:6px}
.auth-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:28px}

/* Onboarding */
.ob-bg{position:fixed;inset:0;background:rgba(20,18,14,.7);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.ob-card{background:var(--surface);border-radius:22px;padding:26px;max-width:380px;width:100%}
.ob-dots{display:flex;gap:5px;justify-content:center;margin-bottom:20px}
.ob-dot{height:6px;border-radius:99px;background:var(--border);transition:all .3s}
.ob-dot.active{background:var(--sage);width:18px}
.ob-dot:not(.active){width:6px}
.ob-icon{font-size:50px;text-align:center;margin-bottom:14px}
.ob-title{font-family:'Playfair Display',serif;font-size:21px;color:var(--ink);text-align:center;margin-bottom:9px}
.ob-body{font-size:13px;color:var(--muted);text-align:center;line-height:1.65;margin-bottom:18px}

/* Chips */
.chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;display:inline-flex;align-items:center}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}

/* Sample banner */
.sample-banner{background:var(--honey-light);border:1px solid #c4892a44;border-radius:9px;padding:7px 11px;margin-bottom:12px;font-size:12px;color:var(--honey);font-weight:600}

/* Spinner */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;background:var(--bg)}
.loading-screen .logo{font-family:'Playfair Display',serif;font-size:28px;color:var(--sage)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto}
.tab{padding:10px 14px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;margin-bottom:-1px}
.tab.active{color:var(--sage);border-bottom-color:var(--sage)}

/* Table */
.tbl{width:100%;border-collapse:collapse;min-width:650px}
.tbl th{padding:7px 6px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;text-align:left;border-bottom:1px solid var(--border);background:var(--parchment);white-space:nowrap}
.tbl td{padding:8px 6px;font-size:13px;color:var(--ink);border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:nth-child(even) td{background:#faf7f266}

/* Note card */
.note-card{border-radius:13px;padding:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .15s}
.note-card:hover{transform:translateY(-2px)}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen" class="loading-screen">
  <div class="logo">🌿 Kinship</div>
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">Loading your family hub…</div>
</div>

<!-- Auth screen -->
<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">🌿 Kinship</div>
    <div class="auth-sub">Your family's all-in-one hub</div>
    <div id="auth-mode-login">
      <div class="form-row">
        <label class="lbl">Email</label>
        <input class="inp" type="email" id="auth-email" placeholder="your@email.com">
      </div>
      <div class="form-row">
        <label class="lbl">Password</label>
        <input class="inp" type="password" id="auth-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:12px" onclick="handleLogin()">Sign In</button>
      <button class="btn btn-secondary btn-full" onclick="showAuthMode('signup')">Create account</button>
      <div id="auth-msg" style="margin-top:10px;font-size:13px;color:var(--rose);text-align:center"></div>
    </div>
    <div id="auth-mode-signup" style="display:none">
      <div class="form-row">
        <label class="lbl">Your Name</label>
        <input class="inp" type="text" id="signup-name" placeholder="Your name">
      </div>
      <div class="form-row">
        <label class="lbl">Email</label>
        <input class="inp" type="email" id="signup-email" placeholder="your@email.com">
      </div>
      <div class="form-row">
        <label class="lbl">Password</label>
        <input class="inp" type="password" id="signup-password" placeholder="min 6 characters">
      </div>
      <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:12px" onclick="handleSignup()">Create Account</button>
      <button class="btn btn-secondary btn-full" onclick="showAuthMode('login')">Already have an account</button>
      <div id="signup-msg" style="margin-top:10px;font-size:13px;color:var(--rose);text-align:center"></div>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="root" style="display:none">
  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-logo">🌿 Kinship</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="family-name-badge" style="font-size:12px;font-weight:700;color:var(--muted)"></span>
      <button class="btn btn-secondary btn-sm" onclick="handleSignOut()">Sign out</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="main-content">
    <div id="page-calendar" class="page active"></div>
    <div id="page-notebook" class="page"></div>
    <div id="page-meds" class="page"></div>
    <div id="page-insights" class="page"></div>
    <div id="page-settings" class="page"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="calendar" onclick="goTo('calendar')">
      <span class="nav-icon">🗓</span>Calendar<div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="notebook" onclick="goTo('notebook')">
      <span class="nav-icon">📓</span>Notebook<div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="meds" onclick="goTo('meds')">
      <span class="nav-icon">💊</span>Meds<div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="insights" onclick="goTo('insights')">
      <span class="nav-icon">📊</span>Insights<div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="settings" onclick="goTo('settings')">
      <span class="nav-icon">⚙️</span>Settings<div class="nav-dot"></div>
    </button>
  </nav>

  <!-- Modal -->
  <div id="modal-root"></div>
  <!-- Onboarding -->
  <div id="ob-root"></div>
</div>

<script>
// ── SUPABASE ─────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://chesapmdtycmzzzmcclk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXNhcG1kdHljbXp6em1jY2xrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NjM3NjAsImV4cCI6MjA5MTAzOTc2MH0.WeqLjqeDQrN3UrpsO13RgNJdK2-WKKR6E-M8XNItKfA';
let sb;
try {
  sb = supabase.createClient(SUPA_URL, SUPA_KEY);
} catch(e) {
  console.error('Supabase init failed:', e);
}

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const T = {
  sage:'#5e8b62',sageMid:'#8ab88e',sageLight:'#d4e8d6',
  terra:'#b85c38',terraLight:'#f2ddd4',
  sky:'#3a7ca5',skyLight:'#d0e4f0',
  plum:'#7c5c8a',plumLight:'#e8d8f0',
  honey:'#c4892a',honeyLight:'#f5e4c4',
  rose:'#b85070',roseLight:'#f0d4de',
  ink:'#1e1b16',muted:'#7a7060',border:'#e0d8cc',
  bg:'#f5f2ed',surface:'#fff',parchment:'#ede8df'
};
const ET = {
  social:{label:'Social Event',icon:'🎉',color:T.sky,bg:T.skyLight,desc:'Gatherings, outings, celebrations'},
  health:{label:'Health Event',icon:'❤️',color:T.rose,bg:T.roseLight,desc:'Appointments, treatments, check-ups'},
  wellness:{label:'Wellness Log',icon:'🌿',color:T.sage,bg:T.sageLight,desc:'Daily health summary'},
  task:{label:'Task',icon:'✅',color:T.honey,bg:T.honeyLight,desc:'To-dos assigned to family members'}
};
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MEMBER_COLORS=[T.sage,T.terra,T.sky,T.plum,T.honey,T.rose];
const MOODS=['😄 Great','😊 Good','😐 Okay','😔 Low','😢 Sad','😤 Stressed','😴 Tired'];
const CURRENCIES=[
  {code:'EUR',sym:'€'},{code:'USD',sym:'$'},{code:'GBP',sym:'£'},{code:'RON',sym:'lei'},
  {code:'CHF',sym:'CHF'},{code:'CAD',sym:'CA$'},{code:'AUD',sym:'A$'},{code:'JPY',sym:'¥'},
  {code:'BRL',sym:'R$'},{code:'INR',sym:'₹'},{code:'SEK',sym:'kr'},{code:'PLN',sym:'zł'},
  {code:'HUF',sym:'Ft'},{code:'AED',sym:'د.إ'},{code:'SGD',sym:'S$'}
];

// ── STATE ────────────────────────────────────────────────────────────────────
let APP = {
  user: null,
  family: null,
  members: [],
  events: [],
  notes: [],
  noteGroups: [],
  dailyMeds: [],
  occMeds: [],
  currentPage: 'calendar',
  calView: 'month',
  calDate: new Date(),
  calFilterType: 'all',
  calFilterMember: 'all',
  calSearch: '',
  settingsTab: 'family',
  noteFilterGroup: 'all',
  noteSearch: '',
  showOnboarding: false,
  obStep: 0,
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = d => { if(!d) return ''; const x=new Date(d); return `${String(x.getDate()).padStart(2,'0')}/${String(x.getMonth()+1).padStart(2,'0')}/${x.getFullYear()}`; };
const toISO = d => d ? new Date(d).toISOString().split('T')[0] : '';
const todayD = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const isSameDay = (a,b) => { const da=new Date(a),db=new Date(b); return da.getFullYear()===db.getFullYear()&&da.getMonth()===db.getMonth()&&da.getDate()===db.getDate(); };
const av = (m,sz=28) => `<div class="avatar" style="width:${sz}px;height:${sz}px;background:${m.color}22;border:2px solid ${m.color};font-size:${Math.round(sz*.38)}px;color:${m.color}">${m.avatar||m.name[0]}</div>`;
const sym = () => CURRENCIES.find(c=>c.code===(APP.family?.currency||'EUR'))?.sym||'€';
const getMember = id => APP.members.find(m=>m.id===id);

function showToast(msg, isError=false) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:${isError?T.rose:T.sage};color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeUp .3s ease`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function showAuthMode(mode) {
  document.getElementById('auth-mode-login').style.display = mode==='login'?'block':'none';
  document.getElementById('auth-mode-signup').style.display = mode==='signup'?'block':'none';
}

async function handleLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const msg = document.getElementById('auth-msg');
  if(!email||!password){msg.textContent='Please fill in all fields.';return;}
  msg.textContent='Signing in…';
  const {error} = await sb.auth.signInWithPassword({email,password});
  if(error){msg.textContent=error.message;}
}

async function handleSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const msg = document.getElementById('signup-msg');
  if(!name||!email||!password){msg.textContent='Please fill in all fields.';return;}
  if(password.length<6){msg.textContent='Password must be at least 6 characters.';return;}
  msg.textContent='Creating account…';
  const {data,error} = await sb.auth.signUp({email,password,options:{data:{name}}});
  if(error){msg.textContent=error.message;return;}
  msg.style.color=T.sage;
  msg.textContent='Account created! Signing you in…';
}

async function handleSignOut() {
  await sb.auth.signOut();
  APP = {...APP, user:null, family:null, members:[], events:[], notes:[], noteGroups:[], dailyMeds:[], occMeds:[]};
  document.getElementById('root').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

// ── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadAllData() {
  const [fam, mems, evts, ngrps, nts, dm, om] = await Promise.all([
    sb.from('families').select('*').single(),
    sb.from('family_members').select('*').order('created_at'),
    sb.from('events').select('*').order('date'),
    sb.from('note_groups').select('*').order('created_at'),
    sb.from('notes').select('*').order('created_at'),
    sb.from('daily_meds').select('*').order('created_at'),
    sb.from('occasional_meds').select('*').order('created_at'),
  ]);
  if(fam.data) APP.family = fam.data;
  if(mems.data) APP.members = mems.data;
  if(evts.data) APP.events = evts.data;
  if(ngrps.data) APP.noteGroups = ngrps.data;
  if(nts.data) APP.notes = nts.data;
  if(dm.data) APP.dailyMeds = dm.data;
  if(om.data) APP.occMeds = om.data;
}

async function initApp(user) {
  APP.user = user;
  document.getElementById('loading-screen').style.display='none';
  await loadAllData();
  if(!APP.family) {
    // New user — create family
    const {data:fam} = await sb.from('families').insert({
      name: user.user_metadata?.name ? `${user.user_metadata.name}'s Family` : 'My Family',
      owner_id: user.id
    }).select().single();
    APP.family = fam;
    // Add self as member
    if(fam) {
      const {data:mem} = await sb.from('family_members').insert({
        family_id: fam.id,
        user_id: user.id,
        name: user.user_metadata?.name || user.email.split('@')[0],
        role: 'Parent',
        email: user.email,
        color: T.sage,
        avatar: (user.user_metadata?.name||user.email)[0].toUpperCase(),
        is_owner: true
      }).select().single();
      if(mem) APP.members = [mem];
    }
    APP.showOnboarding = true;
  }
  document.getElementById('root').style.display='flex';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('family-name-badge').textContent = APP.family?.name||'';
  goTo('calendar');
  if(APP.showOnboarding) renderOnboarding();
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function goTo(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.page===page);
  });
  APP.currentPage = page;
  const renders = {calendar:renderCalendar,notebook:renderNotebook,meds:renderMeds,insights:renderInsights,settings:renderSettings};
  renders[page]?.();
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  const vY=APP.calDate.getFullYear(), vM=APP.calDate.getMonth();
  const firstDay=new Date(vY,vM,1).getDay();
  const daysInM=new Date(vY,vM+1,0).getDate();
  const cells=Array.from({length:Math.ceil((firstDay+daysInM)/7)*7},(_,i)=>{const d=i-firstDay+1;return d>=1&&d<=daysInM?d:null;});

  const filtered = APP.events.filter(e=>{
    if(APP.calFilterType!=='all'&&e.type!==APP.calFilterType) return false;
    if(APP.calFilterMember!=='all'){
      const inPart=(e.participants||[]).includes(APP.calFilterMember);
      const isMem=e.member_id===APP.calFilterMember;
      if(!inPart&&!isMem) return false;
    }
    if(APP.calSearch){
      const q=APP.calSearch.toLowerCase();
      const txt=[e.title,e.description,e.location,e.activity,...(e.tags||[])].filter(Boolean).join(' ').toLowerCase();
      if(!txt.includes(q)) return false;
    }
    return true;
  });

  const evOnDay=d=>filtered.filter(e=>isSameDay(e.date,new Date(vY,vM,d)));

  let calGrid='';
  if(APP.calView==='month'){
    calGrid=`<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px">
      ${DN.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:${T.muted};padding:3px 0;text-transform:uppercase">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${cells.map(d=>{
        if(!d)return'<div></div>';
        const isToday=isSameDay(new Date(vY,vM,d),todayD());
        const de=evOnDay(d);
        return`<div onclick="calDayClick(${d})" style="min-height:54px;padding:3px 2px;border-radius:9px;background:${isToday?T.sageLight:de.length?T.surface:T.parchment+'55'};border:1px solid ${isToday?T.sageMid:T.border};cursor:pointer">
          <div style="width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${isToday?T.sage:'transparent'};color:${isToday?'#fff':T.ink};font-size:11px;font-weight:${isToday?800:600};margin:0 auto 2px">${d}</div>
          <div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center">
            ${de.slice(0,3).map(e=>`<div style="width:6px;height:6px;border-radius:50%;background:${ET[e.type].color}"></div>`).join('')}
            ${de.length>3?`<div style="font-size:8px;color:${T.muted};font-weight:700">+${de.length-3}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } else if(APP.calView==='week'){
    const ws=new Date(APP.calDate); ws.setDate(ws.getDate()-ws.getDay());
    calGrid=Array.from({length:7},(_,i)=>{
      const d=new Date(ws); d.setDate(d.getDate()+i);
      const de=filtered.filter(e=>isSameDay(e.date,d));
      const isToday=isSameDay(d,todayD());
      return`<div style="display:flex;gap:10px;margin-bottom:8px">
        <div style="width:38px;height:38px;border-radius:50%;background:${isToday?T.sage:T.parchment};display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid ${isToday?T.sageMid:T.border};flex-shrink:0">
          <div style="font-size:9px;font-weight:700;color:${isToday?'#fff':T.muted};text-transform:uppercase">${DN[d.getDay()]}</div>
          <div style="font-size:13px;font-weight:800;color:${isToday?'#fff':T.ink};line-height:1">${d.getDate()}</div>
        </div>
        <div style="flex:1;padding-top:2px">
          ${de.length?de.map(e=>`<div onclick="viewEvent('${e.id}')" style="display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:8px;background:${ET[e.type].bg};margin-bottom:4px;cursor:pointer">
            <span style="font-size:13px">${ET[e.type].icon}</span>
            <span style="font-size:12px;font-weight:600;color:${T.ink}">${e.title||ET[e.type].label}</span>
          </div>`).join(''):`<div style="font-size:12px;color:${T.muted};font-style:italic;padding-top:10px">No entries</div>`}
        </div>
      </div>`;
    }).join('');
  } else {
    calGrid=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">${MN.map((mn,mi)=>{
      const cnt=filtered.filter(e=>new Date(e.date).getMonth()===mi&&new Date(e.date).getFullYear()===vY).length;
      return`<div onclick="APP.calDate=new Date(${vY},${mi},1);APP.calView='month';renderCalendar()" style="background:${cnt>0?T.surface:T.parchment+'44'};border-radius:11px;padding:10px 6px;border:1px solid ${T.border};cursor:pointer;text-align:center">
        <div style="font-weight:700;color:${T.ink};font-size:13px">${mn.slice(0,3)}</div>
        ${cnt>0?`<div style="font-size:11px;color:${T.sage};font-weight:700;margin-top:2px">${cnt}</div>`:''}
      </div>`;
    }).join('')}</div>`;
  }

  document.getElementById('page-calendar').innerHTML=`
    <div class="page-header">
      <div class="family-label">${APP.family?.name||''}</div>
      <div class="page-title">Calendar
        <button class="btn btn-primary btn-sm" onclick="showEntryPicker(null)">+ Add</button>
      </div>
    </div>
    <div style="padding:8px 16px 0;display:flex;gap:5px;flex-wrap:wrap">
      ${['month','week','year'].map(v=>`<button onclick="APP.calView='${v}';renderCalendar()" style="padding:4px 12px;border-radius:99px;border:1.5px solid ${APP.calView===v?T.sage:T.border};background:${APP.calView===v?T.sage:'#fff'};color:${APP.calView===v?'#fff':T.muted};font-weight:700;font-size:12px;cursor:pointer;text-transform:capitalize">${v}</button>`).join('')}
      <button onclick="APP.calDate=new Date();renderCalendar()" style="padding:4px 12px;border-radius:99px;border:1.5px solid ${T.border};background:#fff;color:${T.muted};font-weight:700;font-size:12px;cursor:pointer;margin-left:auto">Today</button>
    </div>
    <div style="padding:7px 16px 0;display:flex;gap:6px;overflow-x:auto">
      <select class="sel" style="width:auto;font-size:12px;padding:5px 8px;border-radius:20px;flex-shrink:0" onchange="APP.calFilterType=this.value;renderCalendar()">
        <option value="all">All types</option>
        ${Object.entries(ET).map(([k,v])=>`<option value="${k}"${APP.calFilterType===k?' selected':''}>${v.icon} ${v.label}</option>`).join('')}
      </select>
      <select class="sel" style="width:auto;font-size:12px;padding:5px 8px;border-radius:20px;flex-shrink:0" onchange="APP.calFilterMember=this.value;renderCalendar()">
        <option value="all">All members</option>
        ${APP.members.map(m=>`<option value="${m.id}"${APP.calFilterMember===m.id?' selected':''}>${m.name}</option>`).join('')}
      </select>
    </div>
    <div style="padding:6px 16px 0">
      <input class="inp" placeholder="🔍  Search entries…" value="${APP.calSearch}" oninput="APP.calSearch=this.value;renderCalendar()">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0">
      <button onclick="APP.calDate=new Date(${vY},${vM-1},1);renderCalendar()" style="background:${T.parchment};border:1px solid ${T.border};border-radius:9px;width:33px;height:33px;font-size:18px;cursor:pointer">‹</button>
      <button onclick="showMonthPicker()" style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:${T.ink};background:none;border:none;cursor:pointer">${MN[vM]} ${vY}</button>
      <button onclick="APP.calDate=new Date(${vY},${vM+1},1);renderCalendar()" style="background:${T.parchment};border:1px solid ${T.border};border-radius:9px;width:33px;height:33px;font-size:18px;cursor:pointer">›</button>
    </div>
    <div style="padding:8px 16px">${calGrid}</div>
    ${APP.calSearch&&filtered.length>0?`<div style="padding:0 16px">
      <div style="font-size:11px;font-weight:700;color:${T.muted};margin-bottom:8px;text-transform:uppercase">${filtered.length} results</div>
      ${filtered.map(e=>`<div onclick="viewEvent('${e.id}')" class="card" style="padding:10px 13px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:10px">
        <span style="font-size:17px">${ET[e.type].icon}</span>
        <div><div style="font-weight:700;font-size:13px">${e.title||ET[e.type].label}</div><div style="font-size:11px;color:${T.muted}">${fmt(e.date)}</div></div>
      </div>`).join('')}
    </div>`:''}
  `;
}

function calDayClick(d) {
  const vY=APP.calDate.getFullYear(),vM=APP.calDate.getMonth();
  const dt=new Date(vY,vM,d);
  const de=APP.events.filter(e=>isSameDay(e.date,dt));
  if(de.length) showDayModal(dt,de);
  else showEntryPicker(dt);
}
window.calDayClick=calDayClick;

function showDayModal(dt,de) {
  showModal(`${DN[dt.getDay()]}, ${fmt(dt)}`,
    `${de.map(e=>`<div onclick="closeModal();setTimeout(()=>viewEvent('${e.id}'),50)" style="display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:11px;background:${ET[e.type].bg};margin-bottom:8px;cursor:pointer">
      <span style="font-size:19px">${ET[e.type].icon}</span>
      <div><div style="font-weight:700">${e.title||ET[e.type].label}</div>${e.location?`<div style="font-size:12px;color:${T.muted}">📍 ${e.location}</div>`:''}</div>
    </div>`).join('')}
    <button class="btn btn-primary btn-full" style="margin-top:4px" onclick="closeModal();showEntryPicker(new Date(${dt.getTime()}))">+ Add to this day</button>`
  );
}

      <button onclick="closeModal();openEventForm('${type}',null,${dt?dt.getTime():'null'})" style="display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:13px;border:1.5px solid ${cfg.bg};background:${cfg.bg}88;cursor:pointer;text-align:left;width:100%;margin-bottom:8px">
        <span style="font-size:24px">${cfg.icon}</span>

      </button>`).join('')}
  `);
}
window.showEntryPicker=showEntryPicker;

function openEventForm(type, evId, dateTs) {

  const initialDate = dateTs ? toISO(new Date(dateTs)) : toISO(todayD());
  const members = APP.members;

  let fields = '';
  if(type==='wellness'){
    fields=`
      <div class="form-row"><label class="lbl">Family Member</label>
        <select class="sel" id="ef-member"><option value="">Select…</option>${members.map(m=>`<option value="${m.id}"${ev?.member_id===m.id?' selected':''}>${m.name}</option>`).join('')}</select></div>
      <div class="form-row"><label class="lbl">Date</label><input class="inp" type="date" id="ef-date" value="${ev?toISO(ev.date):initialDate}"></div>
      <div class="grid2" style="margin-bottom:12px">

        <div class="form-row" style="margin:0"><label class="lbl">Height (cm)</label><input class="inp" type="number" id="ef-height" value="${ev?.height||''}" placeholder="168"></div>
      </div>

      <div class="form-row" style="flex-direction:row;align-items:center;gap:8px">
        <input type="checkbox" id="ef-exercised" ${ev?.exercised?'checked':''} onchange="document.getElementById('ef-activity-row').style.display=this.checked?'grid':'none'">
        <label for="ef-exercised" style="font-size:14px;font-weight:600">Exercised today</label>
      </div>
      <div id="ef-activity-row" class="grid2" style="margin-bottom:12px;display:${ev?.exercised?'grid':'none'}">
        <div class="form-row" style="margin:0"><label class="lbl">Activity</label><input class="inp" id="ef-activity" value="${ev?.activity||''}" placeholder="Yoga, Running…"></div>
        <div class="form-row" style="margin:0"><label class="lbl">Mins</label><input class="inp" type="number" id="ef-activity-mins" value="${ev?.activity_mins||''}"></div>
      </div>
      <div class="form-row"><label class="lbl">Mood</label>
        <select class="sel" id="ef-mood">${MOODS.map(m=>`<option${ev?.mood===m?' selected':''}>${m}</option>`).join('')}</select></div>
      <div class="grid2" style="margin-bottom:12px">
        <div class="form-row" style="margin:0"><label class="lbl">Energy (%)</label><input class="inp" type="number" min="0" max="100" id="ef-energy" value="${ev?.energy||''}" placeholder="75"></div>
        <div class="form-row" style="margin:0"><label class="lbl">Sleep (hrs)</label><input class="inp" type="number" step="0.5" id="ef-sleep" value="${ev?.sleep||''}" placeholder="7.5"></div>
      </div>`;

          ${['Appointment','Treatment','Illness','Check-up','Emergency','Other'].map(t=>`<option${ev?.appt_type===t?' selected':''}>${t}</option>`).join('')}
        </select></div>`:''}
      <div class="form-row"><label class="lbl">Title</label><input class="inp" id="ef-title" value="${ev?.title||''}" placeholder="Add a title…"></div>
      ${type!=='task'?`<div class="form-row"><label class="lbl">Location</label><input class="inp" id="ef-location" value="${ev?.location||''}" placeholder="Where?"></div>`:''}
      <div class="grid2" style="margin-bottom:12px">
        <div class="form-row" style="margin:0"><label class="lbl">${type==='task'?'Due Date':'Start'}</label><input class="inp" type="${type==='task'?'date':'datetime-local'}" id="ef-date" value="${ev?toISO(ev.date):initialDate}"></div>
        ${type!=='task'?`<div class="form-row" style="margin:0"><label class="lbl">End</label><input class="inp" type="datetime-local" id="ef-enddate" value="${ev?.end_date?toISO(ev.end_date):''}"></div>`:''}
      </div>
      ${type==='task'?`<div class="form-row"><label class="lbl">Assign To</label>
        <select class="sel" id="ef-member"><option value="">Anyone</option>${members.map(m=>`<option value="${m.id}"${ev?.member_id===m.id?' selected':''}>${m.name}</option>`).join('')}</select></div>`:
        `<div class="form-row"><label class="lbl">Participants</label>

  }

  showModal(`${ev?'Edit':'New'} ${cfg.label}`,`
    <div style="display:flex;flex-direction:column;gap:0">
      ${fields}
      <button class="btn btn-primary btn-full btn-lg" style="margin-top:8px" onclick="saveEvent('${type}','${evId||''}',${dateTs||'null'})">
        ${ev?'Save Changes':'Add Entry'}
      </button>
    </div>
  `);
}
window.openEventForm=openEventForm;

function toggleParticipant(id, btn) {
  const sel = btn.dataset.selected==='true';
  btn.dataset.selected = !sel;
  const m = getMember(id);
  btn.style.border = `1.5px solid ${!sel?m.color:T.border}`;
  btn.style.background = !sel?m.color+'22':'#fff';
  btn.style.color = !sel?m.color:T.muted;
}
window.toggleParticipant=toggleParticipant;

function toggleTag(tag, btn) {
  const sel = btn.dataset.selected==='true';
  btn.dataset.selected = !sel;
  btn.style.border = `1.5px solid ${!sel?T.sage:T.border}`;
  btn.style.background = !sel?T.sageLight:'#fff';
  btn.style.color = !sel?T.sage:T.muted;
}
window.toggleTag=toggleTag;

function addCustomTag() {
  const inp = document.getElementById('ef-newtag');
  const val = inp.value.trim();
  if(!val) return;

async function saveEvent(type, evId, dateTs) {
  const fam = APP.family;
  if(!fam){showToast('Please set up your family first.',true);return;}

  let data = { family_id: fam.id, type };

  if(type==='wellness'){
    data.member_id = document.getElementById('ef-member')?.value||null;
    data.date = new Date(document.getElementById('ef-date').value).toISOString();
    data.title = getMember(data.member_id)?.name ? `${getMember(data.member_id).name} – Wellness Log` : 'Wellness Log';
    data.weight = parseFloat(document.getElementById('ef-weight')?.value)||null;
    data.height = parseFloat(document.getElementById('ef-height')?.value)||null;
    data.hydration = parseInt(document.getElementById('ef-hydration')?.value)||null;
    data.exercised = document.getElementById('ef-exercised')?.checked||false;
    data.activity = document.getElementById('ef-activity')?.value||null;
    data.activity_mins = parseInt(document.getElementById('ef-activity-mins')?.value)||null;
    data.mood = document.getElementById('ef-mood')?.value||null;
    data.energy = parseInt(document.getElementById('ef-energy')?.value)||null;
    data.sleep = parseFloat(document.getElementById('ef-sleep')?.value)||null;
  } else {
    data.title = document.getElementById('ef-title')?.value||'';
    if(!data.title){showToast('Please add a title.',true);return;}
    data.date = new Date(document.getElementById('ef-date')?.value||toISO(todayD())).toISOString();
    data.end_date = document.getElementById('ef-enddate')?.value ? new Date(document.getElementById('ef-enddate').value).toISOString() : null;
    data.location = document.getElementById('ef-location')?.value||null;
    data.description = document.getElementById('ef-description')?.value||null;
    data.appt_type = document.getElementById('ef-appttype')?.value||null;
    data.recurrence = document.getElementById('ef-recurrence')?.value||'None';
    data.member_id = document.getElementById('ef-member')?.value||null;
    // Participants
    const partBtns = document.querySelectorAll('#ef-participants button[data-selected="true"]');
    data.participants = Array.from(partBtns).map(b=>b.getAttribute('onclick')?.match(/'([^']+)'/)?.[1]).filter(Boolean);
    // Fix: get participant ids from onclick
    data.participants = Array.from(document.querySelectorAll('#ef-participants button')).filter(b=>b.dataset.selected==='true').map(b=>{
      const m=APP.members.find(m=>b.textContent.includes(m.name));return m?.id;
    }).filter(Boolean);
    // Tags
    data.tags = Array.from(document.querySelectorAll('#ef-tags button[data-selected="true"]')).map(b=>b.dataset.custom||b.textContent);
  }

  let result;
  if(evId) {
    result = await sb.from('events').update(data).eq('id',evId).select().single();
  } else {
    result = await sb.from('events').insert(data).select().single();
  }
  if(result.error){showToast('Error saving. Please try again.',true);console.error(result.error);return;}

  if(evId) APP.events = APP.events.map(e=>e.id===evId?result.data:e);
  else APP.events.push(result.data);

  closeModal();
  showToast(evId?'Entry updated!':'Entry added!');
  renderCalendar();
}
window.saveEvent=saveEvent;

const NOTE_COLORS=['#d4e8d6','#f0d4de','#f5e4c4','#d0e4f0','#e8d8f0','#ede8df','#f2ddd4'];

function renderNotebook() {
  const notes = APP.notes;
  const groups = APP.noteGroups;
  const filtered = notes.filter(n=>{
    if(APP.noteFilterGroup==='none'&&n.group_id) return false;
    if(APP.noteFilterGroup!=='all'&&APP.noteFilterGroup!=='none'&&n.group_id!==APP.noteFilterGroup) return false;
    if(APP.noteSearch){const q=APP.noteSearch.toLowerCase();const txt=[n.title,n.content,...(n.tags||[]),...(n.checklist||[]).map(c=>c.text)].join(' ').toLowerCase();if(!txt.includes(q))return false;}
    return true;
  });
  const pinned=filtered.filter(n=>n.pinned), rest=filtered.filter(n=>!n.pinned);

  const noteCard=n=>{
    const mem=getMember(n.member_id);
    const grp=groups.find(g=>g.id===n.group_id);
    const done=(n.checklist||[]).filter(c=>c.done).length, total=(n.checklist||[]).length;
    return`<div class="note-card" style="background:${n.color}" onclick="openNoteEditor('${n.id}')">
      ${n.pinned?`<div style="font-size:10px;margin-bottom:3px">📌</div>`:''}
      <div style="font-weight:800;font-size:13px;color:${T.ink};margin-bottom:5px;line-height:1.3">${n.title||'Untitled'}</div>
      ${n.content?`<div style="font-size:12px;color:${T.muted};line-height:1.5;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px">${n.content}</div>`:''}
      ${total>0?`<div style="font-size:11px;color:${T.muted};margin-bottom:5px">✅ ${done}/${total}</div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        ${grp?`<span style="font-size:10px;font-weight:700;background:rgba(255,255,255,.55);border-radius:99px;padding:2px 6px;color:${T.ink}">${grp.name}</span>`:''}
        ${mem?av(mem,16):''}
      </div>
    </div>`;
  };

  document.getElementById('page-notebook').innerHTML=`
    <div class="page-header">
      <div class="family-label">${APP.family?.name||''}</div>
      <div class="page-title">Notebook
        <button class="btn btn-primary btn-sm" onclick="openNoteEditor(null)">+ Note</button>
      </div>
    </div>
    <div style="padding:10px 16px 0">
      <input class="inp" placeholder="🔍  Search notes…" value="${APP.noteSearch}" oninput="APP.noteSearch=this.value;renderNotebook()" style="margin-bottom:10px">
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">
        ${[{id:'all',name:'All'},{id:'none',name:'Uncategorized'},...groups].map(g=>`<button onclick="APP.noteFilterGroup='${g.id}';renderNotebook()" style="padding:4px 12px;border-radius:99px;border:1.5px solid ${APP.noteFilterGroup===g.id?T.sage:T.border};background:${APP.noteFilterGroup===g.id?T.sage:'#fff'};color:${APP.noteFilterGroup===g.id?'#fff':T.muted};font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0">${g.name}</button>`).join('')}
        <button onclick="addNoteGroup()" style="padding:4px 12px;border-radius:99px;border:1.5px dashed ${T.border};background:${T.parchment};color:${T.muted};font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0">+ Group</button>
      </div>
    </div>
    <div style="padding:10px 16px 0">
      ${pinned.length?`<div style="font-size:11px;font-weight:700;color:${T.muted};text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">📌 Pinned</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${pinned.map(noteCard).join('')}</div>`:''}
      ${rest.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${rest.map(noteCard).join('')}</div>`:''}
      ${filtered.length===0?`<div style="text-align:center;color:${T.muted};padding:48px 0;font-size:14px">No notes yet ✍️</div>`:''}
    </div>`;
}

async function saveNote(noteId) {
  if(!APP.family){showToast('Set up your family first.',true);return;}
  const checklist=[];
  document.querySelectorAll('#ne-checklist > div').forEach((row,i)=>{
    const cb=row.querySelector('input[type="checkbox"]');
    const inp=row.querySelector('input[type="text"],input:not([type])');
    if(inp?.value?.trim()) checklist.push({id:'c'+i,text:inp.value.trim(),done:cb?.checked||false});
  });
  const data={
    family_id:APP.family.id,
    title:document.getElementById('ne-title').value,
    content:document.getElementById('ne-content').value,
    color:document.getElementById('ne-color').value,
    group_id:document.getElementById('ne-group').value||null,
    member_id:document.getElementById('ne-member').value||null,
    pinned:document.getElementById('ne-pinned').checked,
    checklist,
  };
  let result;
  if(noteId){result=await sb.from('notes').update(data).eq('id',noteId).select().single();}
  else{result=await sb.from('notes').insert(data).select().single();}
  if(result.error){showToast('Error saving note.',true);return;}
  if(noteId) APP.notes=APP.notes.map(n=>n.id===noteId?result.data:n);
  else APP.notes.push(result.data);
  closeModal();showToast(noteId?'Note updated!':'Note saved!');renderNotebook();
}

async function confirmMedOrder(id){

      </div>

           ['⚡','Energy',aEn?`${Math.round(aEn)}%`:'-',aEn&&aEn>=70,aEn&&aEn<50],

            <div style="font-size:9px;color:${T.muted};font-weight:700;text-transform:uppercase">${lb}</div>

        ${ill>0?`<div style="background:${T.roseLight};border-radius:9px;padding:7px 8px;text-align:center"><div style="font-size:14px">🤒</div><div style="font-size:12px;font-weight:800;color:${T.rose}">${ill}</div><div style="font-size:9px;color:${T.muted};font-weight:700;text-transform:uppercase">Illnesses</div></div>`:''}

function genChallenge(logs){
  const aHy=logs.length?logs.map(l=>parseFloat(l.hydration)||0).reduce((a,b)=>a+b,0)/logs.length:1500;
  const exPct=logs.length?logs.filter(l=>l.exercised).length/logs.length:0;
  const aSlp=logs.length?logs.map(l=>parseFloat(l.sleep)||0).reduce((a,b)=>a+b,0)/logs.length:7;
  if(aHy<1400) return{title:'The Hydration Weekend 💧',body:'Everyone challenges themselves to drink at least 1.5 litres of water each day. A small habit with a big impact on energy and mood!',tips:['Set hourly reminders','Add fruit to water','Glass of water right when you wake up']};
  if(exPct<0.4) return{title:'Family Active Weekend 🏃',body:'Plan one outdoor activity as a family — a 30-minute walk, a bike ride, or a dance-off all count. Moving together is the goal!',tips:['Pick something everyone enjoys','Even 20 minutes counts','Celebrate with a healthy treat']};
  if(aSlp<7) return{title:'Rest & Recharge Weekend 😴',body:'This weekend, aim to be in bed 30 minutes earlier than usual. Great sleep makes everything easier — mood, energy, immunity.',tips:['No screens 1hr before bed','Same bedtime for everyone','Try chamomile tea']};
  return{title:'Mindful Family Weekend 🌿',body:"You're doing great! This weekend: share one thing you're grateful for at dinner. A small ritual that strengthens bonds and lifts everyone's mood.",tips:['Keep it simple','Let kids go first','Write it in the Notebook!']};
}

function genInsights(wLogs,hEvs){
  const ins=[];
  const avg=(arr,k)=>{const v=arr.map(e=>parseFloat(e[k])).filter(v=>!isNaN(v)&&v>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};
  APP.members.forEach(m=>{
    const logs=wLogs.filter(e=>e.member_id===m.id);
    if(logs.length<2)return;
    const aSlp=avg(logs,'sleep'),aHy=avg(logs,'hydration'),aEn=avg(logs,'energy');
    const exPct=logs.filter(l=>l.exercised).length/logs.length;
    if(aSlp&&aSlp<7) ins.push({icon:'😴',title:`${m.name} is sleeping less than recommended`,body:`Average sleep is ${aSlp.toFixed(1)}h — the goal is 7–9h. Even 30 extra minutes can improve mood and energy significantly!`,color:T.honey});
    if(aHy&&aHy<1500) ins.push({icon:'💧',title:`${m.name} could drink more water`,body:`Average hydration is ${Math.round(aHy)}ml/day. Aim for 1800ml+. A visible water bottle nearby is a surprisingly effective habit.`,color:T.sky});
    if(exPct<0.3&&logs.length>=3) ins.push({icon:'🏃',title:`${m.name}'s exercise consistency has room to grow`,body:`Only ${Math.round(exPct*100)}% of logged days included exercise. Even a 15-minute walk makes a real difference!`,color:T.sage});
    if(aEn&&aEn<55) ins.push({icon:'⚡',title:`${m.name}'s energy levels seem low`,body:`Average energy is ${Math.round(aEn)}%. This often links to sleep or hydration — two quick wins if improved together.`,color:T.plum});
  });
  const ill=hEvs.filter(e=>e.appt_type==='Illness');
  if(ill.length>=2) ins.push({icon:'🤒',title:`${ill.length} illness events recorded`,body:`Worth checking if these are recurring for the same person. Vitamin D, zinc and consistent sleep all support immunity.`,color:T.rose});
  if(!ins.length) ins.push({icon:'🌟',title:'Looking great overall!',body:'No major concerns in your family\'s wellness data. Keep logging consistently for richer, more personalised insights over time.',color:T.sage});
  return ins;
}

         {t:'Collaborator Role',d:'A lighter access mode for extended family — they see calendar busyness without private event details.'},
         {t:'Family-to-Family Visibility',d:'Events with a "shared with extended family" flag, visible across connected families.'}
      ].map((idea,i,arr)=>`<div style="padding:12px 0;${i<arr.length-1?`border-bottom:1px solid ${T.border}`:''}">
        <div style="font-weight:700;margin-bottom:4px">💭 ${idea.t}</div>
        <div style="font-size:13px;color:${T.muted};line-height:1.5">${idea.d}</div>
      </div>`).join('')}
    </div>`;
  }

  document.getElementById('page-settings').innerHTML=`
    <div class="page-header">
      <div class="family-label">${fam?.name||''}</div>
      <div class="page-title">Settings</div>
    </div>
    <div class="tabs">
      ${TABS.map(t=>`<button class="tab ${APP.settingsTab===t.id?'active':''}" onclick="APP.settingsTab='${t.id}';renderSettings()">${t.label}</button>`).join('')}
    </div>
    <div style="padding:14px 16px">${tabContent}</div>`;
}

async function saveFamilyName(){
  const name=document.getElementById('s-fname')?.value?.trim();
  if(!name||!APP.family)return;
  const{data}=await sb.from('families').update({name}).eq('id',APP.family.id).select().single();
  if(data){APP.family=data;document.getElementById('family-name-badge').textContent=data.name;showToast('Family name saved!');renderSettings();}
}
window.saveFamilyName=saveFamilyName;

async function addTag(){
  const inp=document.getElementById('s-newtag');
  const val=inp?.value?.trim().toLowerCase();
  if(!val||!APP.family)return;
  const tags=[...new Set([...(APP.family.tags||[]),val])];
  const{data}=await sb.from('families').update({tags}).eq('id',APP.family.id).select().single();
  if(data){APP.family=data;renderSettings();}
}
window.addTag=addTag;

async function removeTag(tag){
  if(!APP.family)return;
  const tags=(APP.family.tags||[]).filter(t=>t!==tag);
  const{data}=await sb.from('families').update({tags}).eq('id',APP.family.id).select().single();
  if(data){APP.family=data;renderSettings();}
}
window.removeTag=removeTag;

async function updateNotif(key,val){
  if(!APP.family)return;
  await sb.from('families').update({[key]:val}).eq('id',APP.family.id);
  APP.family[key]=val;
}
window.updateNotif=updateNotif;

function openAddMember(){
  showModal('Add Family Member',`
    <div class="grid2" style="margin-bottom:12px">
      <div class="form-row" style="margin:0"><label class="lbl">Name</label><input class="inp" id="nm-name" placeholder="Name"></div>
      <div class="form-row" style="margin:0"><label class="lbl">Role</label><input class="inp" id="nm-role" placeholder="Parent, Child…"></div>
      <div class="form-row" style="margin:0"><label class="lbl">Age</label><input class="inp" type="number" id="nm-age"></div>
      <div class="form-row" style="margin:0"><label class="lbl">Gender</label>
        <select class="sel" id="nm-gender"><option value="">Select</option>${['Male','Female','Non-binary','Prefer not to say'].map(g=>`<option>${g}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row"><label class="lbl">Email (for invite)</label><input class="inp" type="email" id="nm-email" placeholder="their@email.com"></div>
    <div style="display:flex;gap:6px;margin-bottom:14px;align-items:center">
      <span class="lbl" style="margin:0">Color:</span>
      ${MEMBER_COLORS.map((c,i)=>`<div onclick="document.querySelectorAll('.mc-swatch').forEach(s=>s.style.border='2px solid transparent');this.style.border='3px solid ${T.ink}';document.getElementById('nm-color').value='${c}'" class="mc-swatch" style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:${i===0?'3px solid '+T.ink:'2px solid transparent'}"></div>`).join('')}
      <input type="hidden" id="nm-color" value="${MEMBER_COLORS[0]}">
    </div>
    <button class="btn btn-primary btn-full" onclick="saveNewMember()">Add Member</button>
  `);
}
window.openAddMember=openAddMember;

async function saveNewMember(){
  if(!APP.family)return;
  const name=document.getElementById('nm-name').value.trim();
  if(!name){showToast('Please add a name.',true);return;}
  const data={
    family_id:APP.family.id,
    name,
    role:document.getElementById('nm-role').value,
    age:parseInt(document.getElementById('nm-age').value)||null,
    gender:document.getElementById('nm-gender').value||null,
    email:document.getElementById('nm-email').value||null,
    color:document.getElementById('nm-color').value,
    avatar:name[0].toUpperCase(),
    is_owner:false,
  };
  const{data:result}=await sb.from('family_members').insert(data).select().single();
  if(result){
    APP.members.push(result);
    closeModal();showToast('Member added!');
    // Offer to send invite
    if(result.email){
      if(confirm(`Send an email invite to ${result.email}?`)) sendInvite(result.email,result.id);
    }
    renderSettings();
  }
}
window.saveNewMember=saveNewMember;

async function sendInvite(email, memberId){
  if(!APP.family)return;
  // Create invitation record
  const{data}=await sb.from('invitations').insert({family_id:APP.family.id,email}).select().single();
  if(data){
    // In production, trigger an email via Supabase Edge Function
    // For now, show the invite link
    const link=`${window.location.origin}${window.location.pathname}?invite=${data.token}`;
    showModal('Invite Sent 📧',`
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:40px;margin-bottom:10px">📧</div>
        <div style="font-weight:700;font-size:16px;margin-bottom:6px">Invite link created!</div>
        <div style="font-size:13px;color:${T.muted};margin-bottom:14px">Share this link with <b>${email}</b> to give them access to <b>${APP.family.name}</b>.</div>
        <div style="background:${T.parchment};border-radius:9px;padding:10px;font-size:12px;word-break:break-all;color:${T.ink};margin-bottom:14px">${link}</div>
        <button class="btn btn-primary btn-full" onclick="navigator.clipboard.writeText('${link}').then(()=>showToast('Link copied!'))">📋 Copy invite link</button>
      </div>
      <div style="font-size:12px;color:${T.muted};text-align:center">In the full production app, this would be sent automatically by email.</div>
    `);
  }
}
window.sendInvite=sendInvite;

// ── BOOT ──────────────────────────────────────────────────────────────────────
function boot() {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const inviteToken = urlParams.get('invite');
    if(inviteToken) sessionStorage.setItem('kinship_invite', inviteToken);
    sb.auth.onAuthStateChange(async (event, session) => {
      try {
        if(session?.user){
          document.getElementById('auth-screen').style.display='none';
          await initApp(session.user);
        } else {
          document.getElementById('loading-screen').style.display='none';
          document.getElementById('root').style.display='none';
          document.getElementById('auth-screen').style.display='flex';
        }
      } catch(err) {
        console.error('Auth state error:', err);
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('auth-screen').style.display='flex';
      }
    });
  } catch(err) {
    console.error('Boot error:', err);
    document.getElementById('loading-screen').innerHTML = '<div style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Something went wrong</div><div style="font-size:13px;color:#7a7060">' + err.message + '</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#5e8b62;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">Retry</button></div>';
  }
}
if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
</body>
</html>
